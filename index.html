<!DOCTYPE html> 
<html lang="pl"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Generator Stolarski</title> 
    <style> 
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7f6; padding: 20px; color: #333; margin: 0; } 
        .container { max-width: 98%; margin: auto; display: flex; gap: 20px; flex-wrap: wrap; align-items: stretch; } 
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; } 
        .panel-left { flex: 1.2; min-width: 440px; max-width: 520px; } 
         
        /* RESPONSYWNOŚĆ CSS DLA PC ORAZ TABLETÓW/TELEFONÓW */ 
        .panel-right { flex: 2.5; min-width: 600px; position: sticky; top: 20px; align-self: flex-start; height: calc(100vh - 40px); } 
        .panel-bottom { flex: 100%; width: 100%; margin-top: 10px; } 
         
        h2 { margin-top: 0; font-size: 1.2rem; color: #1F4E79; border-bottom: 2px solid #E2EFDA; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; } 
        h3 { font-size: 1rem; color: #555; margin-bottom: 10px; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px;} 
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-top: 10px; margin-bottom: 4px; color: #555; } 
        input[type="number"], input[type="text"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; background: #f9fbfd; } 
        input:focus, select:focus { outline: none; border-color: #1F4E79; background: #fff; } 
        input[readonly], input[disabled] { background: #f0f0f0; border-color: #ddd; color: #777; cursor: not-allowed; } 
         
        .view-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #e8f0fe; padding: 12px; border-radius: 6px; border-left: 4px solid #1F4E79; margin-bottom: 15px; } 
        .view-options label { margin: 0; font-weight: bold; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #1F4E79; } 
        .view-options input[type="checkbox"] { width: auto; accent-color: #1F4E79; transform: scale(1.2); margin:0; } 
 
        .space-row { background: #f9fbfd; padding: 10px 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #eee; transition: 0.2s; } 
        .space-row.locked { border-left: 4px solid #d32f2f; background: #fce8e8; } 
        .space-row.resultant { border-left: 4px solid #f57c00; background: #fff3e0; } 
        .space-row.drawer-active { border-left: 4px solid #2e7d32; background: #e8f5e9; } 
        .space-header { display: flex; justify-content: space-between; align-items: center; } 
        .space-row label.main-label { margin: 0; font-size: 0.9rem; color: #333; font-weight: bold; } 
        .space-input-group { display: flex; gap: 8px; align-items: center; } 
        .space-input-group input { width: 80px; text-align: center; font-weight: bold; padding: 6px; border: 1px solid #ccc; border-radius: 4px; } 
         
        .structural-divider { text-align: center; padding: 6px; background: #e2efda; border: 1px dashed #2e7d32; border-radius: 4px; margin-bottom: 8px; } 
        .structural-divider label { margin: 0; cursor: pointer; font-size: 0.8rem; color: #2e7d32; display: flex; justify-content: center; align-items: center; gap: 5px; } 
 
        button { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: #555; transition: 0.2s; } 
        button:hover:not([disabled]) { background: #f0f0f0; } 
        button.btn-shrink:hover { background: #dceafb; } 
         
        .lock-btn { width: 115px; } 
        .lock-btn.locked { background: #d32f2f; color: white; border-color: #b71c1c; } 
        .lock-btn.locked:hover { background: #b71c1c; } 
        .lock-btn[disabled] { opacity: 0.6; cursor: not-allowed; border-color: #f57c00; color: #e65100; background: #ffe0b2; } 
         
        .btn-primary { background: #1F4E79; color: white; border-color: #153a5b; padding: 10px 15px; width: 100%; font-size: 1rem; margin-top: 15px; } 
        .btn-primary:hover { background: #153a5b; } 
         
        .btn-print { background: #2e7d32; color: white; border-color: #1b5e20; } 
        .btn-print:hover { background: #1b5e20; } 
         
        .error-msg { display: none; background: #fce8e8; color: #d32f2f; font-weight: bold; padding: 10px; border-radius: 6px; border: 1px solid #d32f2f; margin-bottom: 15px; text-align: center; font-size: 0.9rem; } 
         
        .saved-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; } 
        .saved-item { background: #f9fbfd; border: 1px solid #ddd; padding: 15px; border-radius: 6px; border-left: 4px solid #f57c00; } 
        .saved-item h4 { margin: 0 0 10px 0; color: #1F4E79; } 
        .saved-item p { margin: 0 0 10px 0; font-size: 0.85rem; color: #555; } 
        .saved-actions { display: flex; gap: 10px; } 
        .btn-load { background: #e2efda; border-color: #2e7d32; color: #2e7d32; flex: 1; } 
        .btn-delete { background: #fce8e8; border-color: #d32f2f; color: #d32f2f; } 
 
        .svg-container { position: relative; overflow: hidden; background: #fafafa; border: 1px dashed #ccc; border-radius: 6px; flex: 1; min-height: 0; cursor: grab; display: flex; justify-content: center; align-items: center; margin-top: 15px; } 
        .svg-container:active { cursor: grabbing; } 
        .svg-wrapper { width: 100%; height: 100%; transform-origin: center center; transition: transform 0.05s linear; pointer-events: none; } 
         
        #printArea { display: none; } 
 
        @media print { 
            body { background: white; margin: 0; padding: 0; } 
            .container { display: none !important; } 
            #printArea { display: block !important; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: white; } 
            #printArea svg { width: 100%; height: 100%; max-height: 98vh; } 
            @page { margin: 0.5cm; } 
        } 
 
        @media (max-width: 1024px) { 
            .panel-right { 
                position: static !important; 
                height: auto !important; 
                align-self: stretch; 
                min-width: 100%; 
            } 
            .svg-container { 
                min-height: 500px; 
            } 
        } 
    </style> 
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script> 
</head> 
<body> 
    <div class="container"> 
        <div class="panel panel-left"> 
            <h2>Opcje i Widoki</h2> 
             
            <div class="view-options"> 
                <label><input type="checkbox" id="sClearance" checked onchange="run()"> Światło (Wymiar)</label> 
                <label><input type="checkbox" id="sShelfAxis" checked onchange="run()"> Oś półki</label> 
                <label><input type="checkbox" id="sShelfHoles" checked onchange="run()"> Nawierty (Półki/Wieńce)</label> 
                <label><input type="checkbox" id="sDistances" checked onchange="run()"> Dystanse podpórek</label> 
                <label><input type="checkbox" id="sHingeAxis" checked onchange="run()"> Prowadnik (oś)</label> 
                <label><input type="checkbox" id="sHingeHoles" checked onchange="run()"> Prowadnik (otwory)</label> 
                <label><input type="checkbox" id="sFront" checked onchange="run()"> Rzut Frontu</label> 
                <label><input type="checkbox" id="sDrawerTopHoles" checked onchange="run()"> Szuflada - Otwór montażowy</label> 
                <label><input type="checkbox" id="sDrawerYDim" checked onchange="run()"> Szuflada - Rozstawy w poziomie (Y)</label> 
                <label style="color:#d32f2f; font-weight:bold; grid-column: span 2;"><input type="checkbox" id="rcMode" onchange="run()"> 🛠 Matryca RC (System 32) [Korekta Liniału]</label>
            </div> 
 
            <h3>Parametry Korpusu</h3> 
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"> 
                <div><label>Wysokość (H)</label><input type="number" id="hBox" value="2000" min="0" oninput="run()"></div> 
                <div><label>Szerokość (W)</label><input type="number" id="wBox" value="600" min="0" oninput="run()"></div> 
                <div><label>Głębokość boku (D)</label><input type="number" id="dBox" value="510" min="0" oninput="run()"></div> 
                <div><label>Ilość półek</label><input type="number" id="qPol" value="4" min="0" oninput="run()"></div> 
                <div><label>Typ korpusu</label> 
                    <select id="kTyp" onchange="run()"> 
                        <option value="wpuszczane">Wpuszczane</option> 
                        <option value="nakladane">Nakładane</option> 
                    </select> 
                </div> 
                <div><label>Wysokość cokołu</label><input type="number" id="cokol" value="100" min="0" oninput="run()"></div> 
                <div><label>Offset podpórki (Dół)</label><input type="number" id="offsetPodporki" value="0" oninput="run()"></div> 
                <div><label>Grubość płyty (korpus)</label><input type="number" id="tBoard" value="18" min="0" oninput="run()"></div> 
                <div><label>Konstrukcja pleców</label> 
                    <select id="backType" onchange="toggleBackFields(); run();"> 
                        <option value="nakladane">Nakładane od tyłu</option> 
                        <option value="nut">Wpuszczane w nut</option> 
                    </select> 
                </div> 
                <div><label>Grubość pleców (mm)</label><input type="number" id="grPlecy" value="3" min="0" oninput="run()"></div>
                <div id="nutDepthField" style="display:none; grid-column: span 2;"><label>Głębokość nutu (mm)</label><input type="number" id="nutDepth" value="12" min="0" oninput="run()"></div> 
            </div> 
 
            <h3>Fronty, Zawiasy i Okucia</h3> 
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"> 
                <div> 
                    <label style="display:flex; justify-content:space-between; align-items:center;"> 
                        Ilość zaw. / drzwi 
                        <span style="font-weight:normal; font-size:0.8rem; display:flex; align-items:center; gap:4px; color:#1F4E79; cursor:pointer;"> 
                            <input type="checkbox" id="autoZaw" checked onchange="toggleAutoZaw()" style="width:auto; margin:0; cursor:pointer;"> Auto (z wys.) 
                        </span> 
                    </label> 
                    <input type="number" id="qZaw" value="4" min="0" max="8" disabled oninput="run()"> 
                </div> 
                <div><label>Strefa ochrony zawiasu</label><input type="number" id="cMargin" value="35" min="0" oninput="run()"></div> 
                <div><label>Puszka (od dołu drzwi)</label><input type="number" id="zOffD" value="100" min="0" oninput="run()"></div> 
                <div><label>Puszka (od góry drzwi)</label><input type="number" id="zOffG" value="100" min="0" oninput="run()"></div> 
                <div><label>Luz frontu (Dół)</label><input type="number" id="fLuzD" value="0" min="0" oninput="run()"></div> 
                <div><label>Luz frontu (Góra)</label><input type="number" id="fLuzG" value="3" min="0" oninput="run()"></div> 
                <div style="grid-column: span 2;"><label>Szczelina między frontami</label><input type="number" id="luzFrontow" value="3" min="0" oninput="run()"></div> 
                 
                <div style="grid-column: span 2;"> 
                    <label>System prowadnic szuflad</label> 
                    <select id="drawerSystem" onchange="updateDrawerFields(); updateAllDrawersToDefault(); run();"> 
                        <option value="44">GTV Axis Pro / Modern Box (Górny: 44mm)</option> 
                        <option value="54">Blum Merivobox (Górny: 54mm)</option> 
                        <option value="33">Blum Antaro / Tandembox (Górny: 33mm)</option> 
                        <option value="custom">Inne (Własny wymiar górnego otworu)</option> 
                    </select> 
                </div> 
                <div id="customDrawerField" style="grid-column: span 2; display:none;"> 
                    <label>Własna wysokość otworu górnego (mm)</label> 
                    <input type="number" id="customDrawerAxis" value="44" min="0" oninput="run()"> 
                </div> 
            </div> 
 
            <h3>Manager Przestrzeni</h3> 
            <div id="errorBox" class="error-msg"></div> 
            <div id="spaceControls"></div> 
 
            <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;"> 
            <label>Nazwa do zapisu projektu:</label> 
            <input type="text" id="cabName" value="Szafka z szufladami i półkami" placeholder="np. Szafka kuchenna lewa"> 
            <div style="display: flex; gap: 10px;"> 
                <button class="btn-primary" onclick="saveCabinet()">💾 Zapisz jako nowy</button> 
                <button id="btnUpdate" class="btn-primary" style="display: none; background: #f57c00; border-color: #e65100;" onclick="updateCabinet()">🔄 Aktualizuj wczytany</button> 
            </div> 
        </div> 
         
        <div class="panel panel-right"> 
            <h2> 
                Widok Warsztatowy (CAD 1:1) 
                <div style="display:flex; gap: 5px; align-items:center;"> 
                    <select id="printType" style="width:auto; padding:5px; font-size:0.85rem; margin-right:5px;"> 
                        <option value="all">Drukuj: Wszystko</option> 
                        <option value="interior">Drukuj: Tylko Wnętrze</option> 
                        <option value="side">Drukuj: Tylko Bok</option> 
                        <option value="front">Drukuj: Tylko Front</option> 
                    </select> 
                    <button class="btn-print" onclick="printView()">🖨️ Drukuj</button> 
                    <span style="color:#ddd; margin: 0 5px;">|</span> 
                    <button onclick="resetZoom()">⟲ Reset</button> 
                    <button onclick="zoomManual(0.2)">+</button> 
                    <button onclick="zoomManual(-0.2)">-</button> 
                </div> 
            </h2> 
            <div id="svgContainer" class="svg-container"> 
                <div id="svgWrapper" class="svg-wrapper"></div> 
            </div> 
        </div> 
 
        <div class="panel panel-bottom"> 
            <h2>Baza zapisanych projektów</h2> 
            <div id="savedList" class="saved-list"></div> 
        </div> 
    </div> 
 
    <div id="printArea"></div> 
 
    <script> 
        const firebaseConfig = { 
            apiKey: "AIzaSyAYIhS-8GDN8K3hXZLelH-B0OoXOzlyFIo", 
            authDomain: "generator-stolarski.firebaseapp.com", 
            projectId: "generator-stolarski", 
            storageBucket: "generator-stolarski.firebasestorage.app", 
            messagingSenderId: "94537532682", 
            appId: "1:94537532682:web:0dbb7053686a891c6c26f3" 
        }; 
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore(); 
        let cloudCabinets = [];  
        let currentLoadedDocId = null;  
        let zScale = 1; let panX = 0; let panY = 0; let isDragging = false; let startX = 0; let startY = 0; 
        let spaceLocks = []; 
        let structuralShelves = []; 
 
        const DRAWER_DB = { 
            "44": { 
                name: "GTV Axis Pro / Modern Box", 
                lengths: [250, 300, 350, 400, 450, 500, 550, 600], 
                ltRequired: 5, 
                yHolesMap: { 
                    250: [96], 300: [128], 350: [128], 400: [192], 450: [192], 500: [224], 550: [224], 600: [224, 352] 
                }, 
                types: [ 
                    { id: "A", label: "A (Niska)", minFront: 105 }, 
                    { id: "B", label: "B (Średnia)", minFront: 160 }, 
                    { id: "C", label: "C (Wysoka)", minFront: 192 }, 
                    { id: "D", label: "D (B. Wysoka)", minFront: 224 } 
                ], 
                default: "C" 
            }, 
            "54": { 
                name: "Blum Merivobox", 
                lengths: [270, 300, 350, 400, 450, 500, 550, 600], 
                ltRequired: 3, 
                yHolesMap: { 
                    270: [96], 300: [128], 350: [128], 400: [192], 450: [192, 256], 500: [224, 288], 550: [224, 352], 600: [224, 384] 
                }, 
                types: [ 
                    { id: "N", label: "N (B. Niska)", minFront: 85.5 }, 
                    { id: "M", label: "M (Niska)", minFront: 108 }, 
                    { id: "K", label: "K (Średnia)", minFront: 146 }, 
                    { id: "E", label: "E (Wysoka)", minFront: 209 } 
                ], 
                default: "K" 
            }, 
            "33": { 
                name: "Blum Antaro / Tandembox", 
                lengths: [270, 300, 350, 400, 450, 500, 550, 600, 650], 
                ltRequired: 3, 
                yHolesMap: { 
                    270: [96], 300: [128], 350: [128], 400: [192], 450: [192, 288], 500: [224, 288], 550: [224, 384], 600: [224, 384], 650: [224, 384, 480] 
                }, 
                types: [ 
                    { id: "N", label: "N (B. Niska)", minFront: 82.5 }, 
                    { id: "M", label: "M (Niska)", minFront: 98.5 }, 
                    { id: "K", label: "K (Średnia)", minFront: 130.5 }, 
                    { id: "C", label: "C (Wysoka)", minFront: 192 }, 
                    { id: "D", label: "D (B. Wysoka)", minFront: 224 } 
                ], 
                default: "D" 
            }, 
            "custom": { 
                name: "Inne (Własne)", 
                lengths: [250, 300, 350, 400, 450, 500, 550, 600], 
                ltRequired: 3, 
                yHolesMap: { 
                    250: [96], 300: [128], 350: [128], 400: [192], 450: [192], 500: [224], 550: [224], 600: [224] 
                }, 
                types: [ 
                    { id: "UNI", label: "Uniwersalna", minFront: 60 } 
                ], 
                default: "UNI" 
            } 
        }; 
 
        function val(id) { return parseFloat(document.getElementById(id).value) || 0; } 
        function isChecked(id) { return document.getElementById(id).checked; } 
 
        function toggleBackFields() { 
            document.getElementById('nutDepthField').style.display = document.getElementById('backType').value === 'nut' ? 'block' : 'none'; 
        } 
 
        let errorTimeout; 
        function showError(msg) { 
            let errBox = document.getElementById('errorBox'); 
            errBox.innerText = msg; errBox.style.display = 'block'; 
            clearTimeout(errorTimeout); 
            errorTimeout = setTimeout(() => { errBox.style.display = 'none'; }, 5000); 
        } 
        function hideError() { document.getElementById('errorBox').style.display = 'none'; } 
 
        function initZoomPan() { 
            const container = document.getElementById('svgContainer'); 
            container.addEventListener('wheel', (e) => { 
                e.preventDefault(); 
                zScale *= Math.exp((e.deltaY < 0 ? 1 : -1) * 0.1); 
                zScale = Math.min(Math.max(0.1, zScale), 10);  
                applyTransform(); 
            }); 
            container.addEventListener('mousedown', (e) => { 
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return; 
                isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; 
            }); 
            window.addEventListener('mousemove', (e) => { 
                if (!isDragging) return; panX = e.clientX - startX; panY = e.clientY - startY; applyTransform(); 
            }); 
            window.addEventListener('mouseup', () => { isDragging = false; }); 
            container.addEventListener('mouseleave', () => { isDragging = false; }); 
        } 
 
        function zoomManual(amount) { zScale = Math.min(Math.max(0.1, zScale + amount), 10); applyTransform(); } 
        function resetZoom() { zScale = 1; panX = 0; panY = 0; applyTransform(); } 
        function applyTransform() { document.getElementById('svgWrapper').style.transform = `translate(${panX}px, ${panY}px) scale(${zScale})`; } 
 
        function toggleAutoZaw() { 
            document.getElementById('qZaw').disabled = document.getElementById('autoZaw').checked; 
            run(); 
        } 
 
        function updateDrawerFields() { 
            let system = document.getElementById('drawerSystem').value; 
            document.getElementById('customDrawerField').style.display = system === 'custom' ? 'block' : 'none'; 
        } 
 
        function updateAllDrawersToDefault() { 
            let sysId = document.getElementById('drawerSystem').value; 
            let dbSys = DRAWER_DB[sysId]; 
            spaceLocks.forEach(space => { 
                if(space.manualFronts) { 
                    space.manualFronts.forEach(mf => { 
                        mf.type = dbSys.default; 
                        let newTypeObj = dbSys.types.find(t => t.id === mf.type); 
                        if(mf.height < newTypeObj.minFront) mf.height = newTypeObj.minFront; 
                    }); 
                } 
            }); 
        } 
 
        function getTopHoleOffset() { 
            let system = document.getElementById('drawerSystem').value; 
            return system === 'custom' ? val('customDrawerAxis') : parseFloat(system); 
        } 
 
        function saveCabinet() { 
            let cab = { 
                id: Date.now(), 
                name: document.getElementById('cabName').value || `Szafka ${val('hBox')}x${val('wBox')}`, 
                kTyp: document.getElementById('kTyp').value, 
                hBox: val('hBox'), wBox: val('wBox'), dBox: val('dBox'), 
                qPol: val('qPol'), tBoard: val('tBoard'), offsetPodporki: val('offsetPodporki'), cokol: val('cokol'), 
                qZaw: val('qZaw'), autoZaw: document.getElementById('autoZaw').checked, zOffD: val('zOffD'), zOffG: val('zOffG'), 
                fLuzD: val('fLuzD'), fLuzG: val('fLuzG'), cMargin: val('cMargin'), 
                luzFrontow: val('luzFrontow'), drawerSystem: document.getElementById('drawerSystem').value, 
                customDrawerAxis: val('customDrawerAxis'), 
                backType: document.getElementById('backType').value, 
                grPlecy: val('grPlecy'),
                nutDepth: val('nutDepth'), 
                spaceLocks: JSON.parse(JSON.stringify(spaceLocks)), 
                structuralShelves: JSON.parse(JSON.stringify(structuralShelves)) 
            }; 
            db.collection("cabinets").add(cab).then(() => { alert("Projekt zapisany!"); }).catch((error) => { alert("Błąd: " + error.message); }); 
        } 
 
        function updateCabinet() { 
            if (!currentLoadedDocId) return; 
            let cab = { 
                name: document.getElementById('cabName').value || `Szafka ${val('hBox')}x${val('wBox')}`, 
                kTyp: document.getElementById('kTyp').value, 
                hBox: val('hBox'), wBox: val('wBox'), dBox: val('dBox'), 
                qPol: val('qPol'), tBoard: val('tBoard'), offsetPodporki: val('offsetPodporki'), cokol: val('cokol'), 
                qZaw: val('qZaw'), autoZaw: document.getElementById('autoZaw').checked, zOffD: val('zOffD'), zOffG: val('zOffG'), 
                fLuzD: val('fLuzD'), fLuzG: val('fLuzG'), cMargin: val('cMargin'), 
                luzFrontow: val('luzFrontow'), drawerSystem: document.getElementById('drawerSystem').value, 
                customDrawerAxis: val('customDrawerAxis'), 
                backType: document.getElementById('backType').value, 
                grPlecy: val('grPlecy'),
                nutDepth: val('nutDepth'),

            };

        function loadCabinet(docId) { 
            let cab = cloudCabinets.find(c => c.docId === docId); 
            if(!cab) return; 
 
            document.getElementById('cabName').value = cab.name; 
            document.getElementById('kTyp').value = cab.kTyp; 
            ['hBox','wBox','dBox','qPol','tBoard','offsetPodporki','qZaw','zOffD','zOffG','fLuzG'].forEach(id => { 
                document.getElementById(id).value = cab[id]; 
            }); 
            document.getElementById('cokol').value = cab.cokol !== undefined ? cab.cokol : 100; 
            document.getElementById('autoZaw').checked = cab.autoZaw !== undefined ? cab.autoZaw : true; 
            document.getElementById('qZaw').disabled = document.getElementById('autoZaw').checked; 
            document.getElementById('fLuzD').value = cab.fLuzD !== undefined ? cab.fLuzD : 0; 
            document.getElementById('cMargin').value = cab.cMargin !== undefined ? cab.cMargin : 35; 
            document.getElementById('luzFrontow').value = cab.luzFrontow !== undefined ? cab.luzFrontow : 3; 
            document.getElementById('backType').value = cab.backType !== undefined ? cab.backType : 'nakladane'; 
            document.getElementById('grPlecy').value = cab.grPlecy !== undefined ? cab.grPlecy : 3;
            document.getElementById('nutDepth').value = cab.nutDepth !== undefined ? cab.nutDepth : 12; 
             
            toggleBackFields(); 
 
            let loadedSys = cab.drawerSystem !== undefined ? cab.drawerSystem : "44"; 
            document.getElementById('drawerSystem').value = loadedSys; 
            document.getElementById('customDrawerAxis').value = cab.customDrawerAxis !== undefined ? cab.customDrawerAxis : 44; 
 
            updateDrawerFields(); 
            let sysObj = DRAWER_DB[loadedSys]; 
 
            spaceLocks = cab.spaceLocks.map(s => { 
                let mFronts = s.manualFronts || [200, 200, 200]; 
                mFronts = mFronts.map(f => { 
                    if (typeof f === 'number') return { height: f, type: sysObj.default }; 
                    return { height: f.height, type: f.type || sysObj.default }; 
                }); 
 
                return { 
                    locked: s.locked || false, 
                    manualVal: s.manualVal || 0, 
                    currentVal: s.currentVal || 0, 
                    hasDrawers: s.hasDrawers || false, 
                    drawerMode: s.drawerMode || 'auto', 
                    qDrawers: s.qDrawers || 3, 
                    manualFronts: mFronts, 
                    topGapToAxis: s.topGapToAxis !== undefined ? s.topGapToAxis : 12, 
                    manualDrawerNL: s.manualDrawerNL || {} 
                }; 
            }); 
 
            structuralShelves = cab.structuralShelves || new Array(val('qPol')).fill(false); 
            currentLoadedDocId = docId; 
            document.getElementById('btnUpdate').style.display = 'block'; 
            run(); window.scrollTo(0, 0);  
        } 
 
        function deleteCabinet(docId) { 
            if(!confirm("Usunąć ten projekt?")) return; 
            db.collection("cabinets").doc(docId).delete(); 
        } 
 
        db.collection("cabinets").onSnapshot((querySnapshot) => { 
            cloudCabinets = []; 
            let listHtml = querySnapshot.empty ? '<p style="color:#777;">Brak zapisanych projektów.</p>' : ''; 
            querySnapshot.forEach((doc) => { 
                let cab = doc.data(); cab.docId = doc.id; cloudCabinets.push(cab); 
                let locksInfo = cab.spaceLocks ? cab.spaceLocks.filter(s => s.locked).length : 0; 
                listHtml += ` 
                    <div class="saved-item"> 
                        <h4>${cab.name}</h4> 
                        <p>Gabaryt: ${cab.hBox}x${cab.wBox}x${cab.dBox} mm<br>Półki: ${cab.qPol} | Blokady: ${locksInfo}</p> 
                        <div class="saved-actions"> 
                            <button class="btn-load" onclick="loadCabinet('${cab.docId}')">Wczytaj</button> 
                            <button class="btn-delete" onclick="deleteCabinet('${cab.docId}')">Usuń</button> 
                        </div> 
                    </div>`; 
            }); 
            document.getElementById('savedList').innerHTML = listHtml; 
        }); 
 
        function printView() { 
            let type = document.getElementById('printType').value; 
            let svgNode = document.querySelector('#svgWrapper svg').cloneNode(true); 
            let hBox = val('hBox'); let wBox = val('wBox'); let dBox = val('dBox'); 
            let sXBok = wBox + 300; let sXFront = sXBok + dBox + 1200;  
 
            // Ukrywanie elementów bocznych wyłączonych z wydruku
            svgNode.querySelectorAll('.hide-on-print').forEach(el => el.remove());

            if (type === 'interior') svgNode.setAttribute('viewBox', `-100 -120 ${wBox + 200} ${hBox + 250}`); 
            else if (type === 'side') svgNode.setAttribute('viewBox', `${sXBok - 200} -120 ${dBox + 900} ${hBox + 250}`); 
            else if (type === 'front') svgNode.setAttribute('viewBox', `${sXFront - 100} -120 ${wBox + 300} ${hBox + 250}`); 
 
            document.getElementById('printArea').innerHTML = ''; 
            document.getElementById('printArea').appendChild(svgNode); 
            window.print(); 
        } 
 
        function resetLocksAndRun() { 
            let qPol = val('qPol'); let totalSpaces = qPol + 1; 
            let sysId = document.getElementById('drawerSystem').value; 
            let dbSys = DRAWER_DB[sysId] || DRAWER_DB["44"]; 
 
            spaceLocks = []; 
            for(let i = 0; i < totalSpaces; i++) { 
                spaceLocks.push({  
                    locked: false, manualVal: 0, currentVal: 0, 
                    hasDrawers: false, drawerMode: 'auto', qDrawers: 3, 
                    manualFronts: [ 
                        { height: 200, type: dbSys.default }, 
                        { height: 200, type: dbSys.default }, 
                        { height: 140, type: dbSys.default } 
                    ], 
                    topGapToAxis: 12, 
                    manualDrawerNL: {} 
                }); 
            } 
            structuralShelves = new Array(qPol).fill(false); 
            hideError(); run(); 
        } 
 
        function toggleLock(index) { 
            hideError(); 
            if(spaceLocks[index].locked) spaceLocks[index].locked = false; 
            else { 
                if (spaceLocks.filter(s => s.locked).length >= spaceLocks.length - 1) { showError("Zostaw min. 1 wymiar auto."); return; } 
                spaceLocks[index].locked = true; 
                spaceLocks[index].manualVal = spaceLocks[index].currentVal; 
            } 
            run(); 
        } 
         
        function toggleDrawers(index) { spaceLocks[index].hasDrawers = !spaceLocks[index].hasDrawers; run(); } 
        function toggleStructural(index) { structuralShelves[index] = !structuralShelves[index]; run(); } 
         
        function changeDrawerMode(index, mode) { 
            spaceLocks[index].drawerMode = mode; 
            if(mode === 'manual') spaceLocks[index].locked = true; 
            run(); 
        } 
 
        function updateDrawerCount(index, value) { 
            let q = parseInt(value); if(!isNaN(q) && q > 0) spaceLocks[index].qDrawers = q; run(); 
        } 
 
        function updateDrawerNL(spaceIdx, drawerIdx, value) { 
            if(!spaceLocks[spaceIdx].manualDrawerNL) spaceLocks[spaceIdx].manualDrawerNL = {}; 
            spaceLocks[spaceIdx].manualDrawerNL[drawerIdx] = value; 
            run(); 
        } 
 
        function updateFrontHeight(spaceIdx, frontIdx, value) { 
            let v = parseFloat(value); if(isNaN(v) || v <= 0) return; 
             
            let sys = DRAWER_DB[document.getElementById('drawerSystem').value]; 
            let front = spaceLocks[spaceIdx].manualFronts[frontIdx]; 
            front.height = v; 
             
            let fittingTypes = sys.types.filter(t => t.minFront <= v); 
            if (fittingTypes.length > 0) front.type = fittingTypes[fittingTypes.length - 1].id; 
            else { front.height = sys.types[0].minFront; front.type = sys.types[0].id; } 
             
            run(); 
        } 
 
        function updateDrawerType(spaceIdx, frontIdx, typeVal) { 
            let sys = DRAWER_DB[document.getElementById('drawerSystem').value]; 
            let front = spaceLocks[spaceIdx].manualFronts[frontIdx]; 
            let newTypeObj = sys.types.find(t => t.id === typeVal); 
             
            front.type = typeVal; 
            if (front.height < newTypeObj.minFront) { 
                front.height = newTypeObj.minFront; 
            } 
             
            run(); 
        } 
 
        function shrinkFront(spaceIdx, frontIdx) { 
            let sys = DRAWER_DB[document.getElementById('drawerSystem').value]; 
            let front = spaceLocks[spaceIdx].manualFronts[frontIdx]; 
            let typeObj = sys.types.find(t => t.id === front.type); 
            if (typeObj) { 
                front.height = typeObj.minFront; 
            } 
            run(); 
        } 
 
        function addManualFront(spaceIdx) { 
            let sysId = document.getElementById('drawerSystem').value; 
            let defType = DRAWER_DB[sysId].default; 
            let defHeight = DRAWER_DB[sysId].types.find(t => t.id === defType).minFront + 20; 
            spaceLocks[spaceIdx].manualFronts.push({ height: defHeight, type: defType }); 
            run(); 
        } 
 
        function removeManualFront(spaceIdx) { 
            if(spaceLocks[spaceIdx].manualFronts.length > 1) spaceLocks[spaceIdx].manualFronts.pop(); 
            run(); 
        } 
 
        function updateTopGap(spaceIdx, value) { 
            let v = parseFloat(value); if(!isNaN(v)) spaceLocks[spaceIdx].topGapToAxis = v; run(); 
        } 
 
        function handleSpaceInput(index, value) { 
            let num = parseFloat(value); 
            if(isNaN(num) || num < 0) { spaceLocks[index].locked = false; hideError(); run(); return; } 
             
            let isCurrentlyLocked = spaceLocks[index].locked; 
            let lockedCount = spaceLocks.filter(s => s.locked).length; 
            if (!isCurrentlyLocked && lockedCount >= spaceLocks.length - 1) { 
                showError("Przestrzeń automatyczna/wypadkowa. Odblokuj inne, aby zmienić ten wymiar."); run(); return; 
            } 
 
            let hBox = val('hBox'); let tBoard = val('tBoard'); let qPol = val('qPol'); let cokol = val('cokol'); 
            let innerSpace = hBox - 2*tBoard - cokol; 
            let otherLockedSum = 0; 
            for(let i = 0; i < spaceLocks.length; i++) if(i !== index && spaceLocks[i].locked) otherLockedSum += spaceLocks[i].manualVal; 
 
            let maxAllowed = innerSpace - (qPol * tBoard) - otherLockedSum; 
            if (num > maxAllowed) { showError(`Brak miejsca! Max: ${maxAllowed} mm.`); num = maxAllowed; }  
            else hideError(); 
 
            spaceLocks[index].locked = true; spaceLocks[index].manualVal = num; run(); 
        } 
 
        function run() { 
            let kTyp = document.getElementById('kTyp').value; 
            let hBox = val('hBox'); let wBox = val('wBox'); let dBox = val('dBox'); let tBoard = val('tBoard'); 
            let qPol = val('qPol'); let offsetPodporki = val('offsetPodporki'); let cokol = val('cokol'); 
            let backType = document.getElementById('backType').value; 
            let nutDepth = val('nutDepth'); 
            let grPlecy = val('grPlecy');
            
            // --- TRYB MATRYCY RC ---
            let rcMode = isChecked('rcMode');
 
            let sClearance = isChecked('sClearance'); let sShelfAxis = isChecked('sShelfAxis'); 
            let sShelfHoles = isChecked('sShelfHoles'); let sDistances = isChecked('sDistances'); 
            let sHingeAxis = isChecked('sHingeAxis'); let sHingeHoles = isChecked('sHingeHoles'); 
            let sFront = isChecked('sFront'); let sDrawerTopHoles = isChecked('sDrawerTopHoles'); 
            let sDrawerYDim = isChecked('sDrawerYDim'); 
 
            let topHoleOffset = getTopHoleOffset(); 
            let fLuzD = val('fLuzD'); let fLuzG = val('fLuzG'); let luzFrontow = val('luzFrontow'); 
             
            let globalQZaw = val('qZaw'); 
            let isAutoZaw = isChecked('autoZaw'); 
            let sysDB = DRAWER_DB[document.getElementById('drawerSystem').value]; 
 
            let currentLInternal = (backType === 'nut') ? (dBox - 18 - nutDepth) : (dBox - 18); 
            hideError(); 
 
            let totalSpaces = qPol + 1; 
            
            while(spaceLocks.length < totalSpaces) {
                spaceLocks.push({  
                    locked: false, manualVal: 0, currentVal: 0, 
                    hasDrawers: false, drawerMode: 'auto', qDrawers: 3, 
                    manualFronts: [ 
                        { height: 200, type: sysDB.default }, 
                        { height: 200, type: sysDB.default }, 
                        { height: 140, type: sysDB.default } 
                    ], 
                    topGapToAxis: 12, 
                    manualDrawerNL: {} 
                }); 
            }
            if (spaceLocks.length > totalSpaces) {
                spaceLocks = spaceLocks.slice(0, totalSpaces);
            }
            
            while(structuralShelves.length < qPol) {
                structuralShelves.push(false);
            }
            if (structuralShelves.length > qPol) {
                structuralShelves = structuralShelves.slice(0, qPol);
            }
 
            let facadeShift = 0; 
            for(let i = 0; i < totalSpaces; i++) { 
                if(spaceLocks[i].hasDrawers && spaceLocks[i].drawerMode === 'manual') { 
                    let sumFronts = spaceLocks[i].manualFronts.reduce((a,b) => a + b.height, 0); 
                    let totalLuz = (spaceLocks[i].manualFronts.length - 1) * luzFrontow; 
                    let reqSpace = (i === 0)  
                        ? fLuzD + sumFronts + totalLuz + spaceLocks[i].topGapToAxis - 1.5 * tBoard 
                        : facadeShift + sumFronts + totalLuz + spaceLocks[i].topGapToAxis + (luzFrontow/2) - tBoard; 
                     
                    spaceLocks[i].locked = true; 
                    spaceLocks[i].manualVal = Math.round(reqSpace * 10) / 10; 
                    facadeShift = (luzFrontow / 2) - spaceLocks[i].topGapToAxis; 
                } else facadeShift = 0;  
            } 
 
            let innerSpace = hBox - 2*tBoard - cokol; 
            let usedSpace = 0; let unlockedCount = 0; 
            for(let i = 0; i < totalSpaces; i++) { 
                if(spaceLocks[i].locked) usedSpace += spaceLocks[i].manualVal;  
                else unlockedCount++; 
            } 
 
            let remainingForAuto = innerSpace - (qPol * tBoard) - usedSpace; 
            let autoVal = (unlockedCount > 0 && remainingForAuto > 0) ? Math.round(remainingForAuto / unlockedCount) : 0; 
             
            let accumulatedAuto = 0; 
            for(let i = 0; i < totalSpaces; i++) { 
                if(spaceLocks[i].locked) spaceLocks[i].currentVal = spaceLocks[i].manualVal; 
                else { 
                    if (unlockedCount === 1) spaceLocks[i].currentVal = remainingForAuto - accumulatedAuto; 
                    else { spaceLocks[i].currentVal = autoVal; accumulatedAuto += autoVal; unlockedCount--; } 
                } 
            } 
            unlockedCount = spaceLocks.filter(s => !s.locked).length; 
 
            let controlsHtml = ''; 
            for(let i = 0; i < totalSpaces; i++) { 
                let isTop = (i === totalSpaces - 1); let isBottom = (i === 0); 
                let label = `Światło ${i+1}` + (isBottom ? ` (Dół)` : (isTop ? ` (Góra)` : ``)); 
                let isLocked = spaceLocks[i].locked; let isOnlyUnlocked = (!isLocked && unlockedCount === 1); 
                let isDrawers = spaceLocks[i].hasDrawers; let drawerMode = spaceLocks[i].drawerMode; 
                let isManual = isDrawers && drawerMode === 'manual'; 
                 
                let rowClass = 'space-row' + (isLocked ? ' locked' : '') + (isDrawers ? ' drawer-active' : '') + (isOnlyUnlocked && !isDrawers ? ' resultant' : ''); 
                let btnClass = isLocked ? 'lock-btn locked' : 'lock-btn'; 
                let btnText = isLocked ? '🔒 Odblokuj' : '🔓 Zablokuj'; 
                if (isOnlyUnlocked) btnText = '⭐ Wypadkowa'; if (isManual) btnText = '🧱 Bottom-Up'; 
                let inputProps = (isOnlyUnlocked || isManual) ? 'readonly' : ''; 
                let btnProps = (isOnlyUnlocked || isManual) ? 'disabled' : `onclick="toggleLock(${i})"`; 
 
                let drawerHtml = ` 
                    <div style="margin-top: 6px; display: flex; flex-direction: column; gap: 4px; background: #fff; padding: 6px; border-radius: 4px; border: 1px solid #ddd;"> 
                        <div style="display:flex; align-items:center; gap: 10px;"> 
                            <label style="cursor:pointer; display:flex; align-items:center; gap:4px; margin:0; font-weight:normal; color:#1F4E79;"> 
                                <input type="checkbox" ${isDrawers ? 'checked' : ''} onchange="toggleDrawers(${i})"> <b>Moduł Szuflad</b> 
                            </label> 
                            ${isDrawers ? `<select onchange="changeDrawerMode(${i}, this.value)" style="padding: 2px 5px; font-size:0.8rem; width:auto;"> 
                                    <option value="auto" ${drawerMode==='auto'?'selected':''}>Równomiernie (Auto)</option> 
                                    <option value="manual" ${drawerMode==='manual'?'selected':''}>Własne fronty (Bottom-Up)</option> 
                                </select>` : ''} 
                        </div>`; 
 
                if (isDrawers) { 
                    if (drawerMode === 'auto') { 
                        drawerHtml += `<div style="display:flex; gap: 8px; align-items:center; margin-top:4px;"><span style="font-size:0.8rem;">Ilość:</span><input type="number" value="${spaceLocks[i].qDrawers}" min="1" onchange="updateDrawerCount(${i}, this.value)" style="width: 50px; padding: 2px; text-align:center;"><span style="font-size:0.8rem;">szt.</span></div>`; 
                    } else { 
                        drawerHtml += `<div style="font-size:0.8rem; margin-top:6px; border-top: 1px dashed #eee; padding-top:6px;">`; 
                        spaceLocks[i].manualFronts.forEach((mf, fIdx) => { 
                            let lbl = (fIdx === 0) ? `F${fIdx+1} (Dół)` : `F${fIdx+1}`; 
                            let optionsHtml = ''; 
                             
                            let tObj = sysDB.types.find(t => t.id === mf.type); 
                            let minReq = tObj ? tObj.minFront : 0; 
                            let canShrink = mf.height > minReq; 
 
                            sysDB.types.forEach(t => { 
                                let isDisabled = mf.height < t.minFront ? 'disabled' : ''; 
                                let isSelected = mf.type === t.id ? 'selected' : ''; 
                                optionsHtml += `<option value="${t.id}" ${isDisabled} ${isSelected}>${t.label} (min.${t.minFront})${isDisabled ? ' ⚠️' : ''}</option>`; 
                            }); 
                             
                            let shrinkBtnHtml = canShrink ? `<button type="button" class="btn-shrink" onclick="shrinkFront(${i}, ${fIdx})" title="Ściśnij front do ${minReq}mm" style="padding:2px 6px; font-size:0.8rem; background:#e8f0fe; border:1px solid #1F4E79; color:#1F4E79; border-radius:4px; cursor:pointer;">>< Ściśnij</button>` : ''; 
 
                            if(!spaceLocks[i].manualDrawerNL) spaceLocks[i].manualDrawerNL = {}; 
                            let currentSavedNL = spaceLocks[i].manualDrawerNL[fIdx]; 
                             
                            let autoSelectedNL = sysDB.lengths[0]; 
                            sysDB.lengths.forEach(len => { 
                                if(currentLInternal >= (len + sysDB.ltRequired)) autoSelectedNL = len; 
                            }); 
                             
                            let finalActiveNL = currentSavedNL === undefined || currentSavedNL === 'auto' ? autoSelectedNL : parseFloat(currentSavedNL); 
                             
                            let selectNLHtml = `<select onchange="updateDrawerNL(${i}, ${fIdx}, this.value)" style="padding: 3px; font-size:0.8rem; border-color:#ccc; border-radius:4px; width:110px;">`; 
                            selectNLHtml += `<option value="auto">Auto (${autoSelectedNL}mm)</option>`; 
                             
                            sysDB.lengths.forEach(len => { 
                                let isSel = (currentSavedNL !== undefined && currentSavedNL !== 'auto' && parseFloat(currentSavedNL) === len) ? 'selected' : ''; 
                                selectNLHtml += `<option value="${len}" ${isSel}>${len} mm</option>`; 
                            }); 
                            selectNLHtml += `</select>`; 
 
                            let alertSpan = ''; 
                            if(currentLInternal < (finalActiveNL + sysDB.ltRequired)) { 
                                alertSpan = `<span style="color:#d32f2f; font-weight:bold; display:block; font-size:0.75rem; margin-top:2px;">⚠️ Za długa! Wymaga min. ${finalActiveNL + sysDB.ltRequired}mm</span>`; 
                                showError(`Błąd konfiguracji! Szuflada w świetle ${i+1} (F${fIdx+1}) jest zbyt długa dla wybranej głębokości korpusu.`); 
                            } else { 
                                let freeSpace = currentLInternal - (finalActiveNL + sysDB.ltRequired); 
                                if(freeSpace > 0) { 
                                    alertSpan = `<span style="color:#2e7d32; display:block; font-size:0.75rem; margin-top:2px;">Luz z tyłu: +${Math.round(freeSpace)}mm</span>`; 
                                } 
                            } 
 
                            drawerHtml += ` 
                                <div style="display:flex; flex-direction:column; margin-bottom:6px; background: #fdfdfd; padding: 6px; border: 1px solid #eee; border-radius: 4px;"> 
                                    <div style="display:flex; justify-content:space-between; align-items:center;"> 
                                        <div style="display:flex; align-items:center; gap: 5px;"> 
                                            <span style="font-size:0.8rem; font-weight:bold; color:#555; width:55px;">${lbl}:</span> 
                                            <input type="number" value="${mf.height}" onchange="updateFrontHeight(${i}, ${fIdx}, this.value)" style="width: 65px; padding: 4px; text-align:center; border: 1px solid #ccc; border-radius: 4px;"> 
                                        </div> 
                                        <div style="display:flex; align-items:center; gap: 5px;"> 
                                            <select onchange="updateDrawerType(${i}, ${fIdx}, this.value)" style="padding: 3px; font-size:0.8rem; border-color:#ccc; border-radius:4px; max-width: 140px;"> 
                                                ${optionsHtml} 
                                            </select> 
                                            ${shrinkBtnHtml} 
                                        </div> 
                                    </div> 
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; border-top:1px dotted #eee; padding-top:4px;"> 
                                        <span style="font-size:0.8rem; color:#666;">Prowadnica:</span> 
                                        <div> 
                                            ${selectNLHtml} 
                                            ${alertSpan} 
                                        </div> 
                                    </div> 
                                </div>`; 
                        }); 
                        drawerHtml += ` 
                            <div style="display:flex; gap:5px; margin-bottom: 8px;"> 
                                <button type="button" onclick="addManualFront(${i})" style="flex:1; padding:2px;">+ Dodaj front</button> 
                                <button type="button" onclick="removeManualFront(${i})" style="flex:1; padding:2px;">- Usuń</button> 
                            </div> 
                            <div style="display:flex; justify-content:space-between; align-items:center; background:#e8f0fe; padding:4px; border-radius:4px;"> 
                                <span>Luz do osi półki:</span> 
                                <div><input type="number" value="${spaceLocks[i].topGapToAxis}" onchange="updateTopGap(${i}, this.value)" style="width: 50px; padding: 2px; text-align:center;"> mm</div> 
                            </div> 
                        </div>`; 
                    } 
                } 
                drawerHtml += `</div>`; 
                controlsHtml += `<div class="${rowClass}"><div class="space-header"><div style="flex:1;"><label class="main-label">${label}</label>${drawerHtml}</div><div class="space-input-group" style="align-self: flex-start; margin-top:5px;"><input type="number" value="${spaceLocks[i].currentVal}" onchange="handleSpaceInput(${i}, this.value)" ${inputProps}><button class="${btnClass}" ${btnProps}>${btnText}</button></div></div></div>`; 
                if (i < totalSpaces - 1) { 
                    controlsHtml += `<div class="structural-divider"><label><input type="checkbox" ${structuralShelves[i] ? 'checked' : ''} onchange="toggleStructural(${i})"> 🔩 Półka konstrukcyjna</label></div>`; 
                } 
            }

                        if (sDrawerYDim) { 
                            svg += `<line x1="${prevHoleX}" y1="${yT - 25}" x2="${holeX}" y2="${yT - 25}" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>`; 
                            svg += `<text x="${(prevHoleX + holeX)/2}" y="${yT - 33}" font-size="${fontS}" font-weight="bold" fill="#1F4E79" text-anchor="middle">${step}</text>`; 
                        } 
                        prevHoleX = holeX; 
                    }); 
                } 
            }); 
 
            if ((sHingeAxis || sHingeHoles) && (isAutoZaw || globalQZaw > 0)) { 
                doorZawiasy.forEach(zaw => { 
                    let drillY = hBox - zaw.bodyY; let color = zaw.shifted ? "#9c27b0" : "#0288d1";  
                    let valAbs = Math.round(zaw.bodyY - sideBottom);
                    let topAbs = Math.round(sideTop - zaw.bodyY);
                    let txtDisplay = `Prowadnik: ${valAbs}`;
                    if (rcMode) txtDisplay += ` [M: ${valAbs - 32}]`;
                    txtDisplay += ` (${topAbs})${zaw.shifted ? " [KOREKTA]" : ""}`;

                    if (sHingeAxis) svg += `<line x1="${hFrontX - 20}" y1="${drillY}" x2="${laneHingeAxis - 10}" y2="${drillY}" stroke="${color}" stroke-dasharray="2,2" stroke-width="2"/><text x="${laneHingeAxis}" y="${drillY + 8}" font-size="${fontL}" font-weight="bold" fill="${color}" text-anchor="start">${txtDisplay}</text>`; 
                    if (sHingeHoles) [-16, 16].forEach(off => { 
                        let hy = hBox - (zaw.bodyY + off); 
                        svg += `<circle cx="${hFrontX}" cy="${hy}" r="4" fill="${color}"/><line x1="${hFrontX}" y1="${hy}" x2="${laneHingeHoles - 10}" y2="${hy}" stroke="${color}" stroke-dasharray="1,2" stroke-width="1.5"/><text x="${laneHingeHoles}" y="${hy + 8}" font-size="${fontM}" fill="${color}" text-anchor="start">${Math.round(zaw.bodyY + off - sideBottom)}</text>`; 
                    }); 
                }); 
            } 
 
            if (sFront) { 
                svg += `<text x="${sXFront + wBox/2}" y="-80" font-size="36" font-weight="bold" fill="#2e7d32" text-anchor="middle">FRONT (Podział zewnętrzny)</text>`; 
                let baseF = hBox - cokol - fLuzD;  
                svg += `<line x1="${sXFront - 50}" y1="${baseF}" x2="${sXFront + wBox + 150}" y2="${baseF}" stroke="#2e7d32" stroke-width="3" stroke-dasharray="8,8" opacity="0.6"/><text x="${sXFront + wBox + 160}" y="${baseF + 8}" font-size="${fontL}" font-weight="bold" fill="#2e7d32" text-anchor="start">0 mm (DÓŁ FRONTU)</text>`; 
                 
                frontBlocks.forEach(fb => { 
                    let rectTopY = hBox - fb.yEnd; let rectH = fb.yEnd - fb.yStart; 
                    if(fb.type === 'door') { 
                        svg += `<rect x="${sXFront}" y="${rectTopY}" width="${wBox}" height="${rectH}" fill="#e2efda" stroke="#2e7d32" stroke-width="${lineW}"/><text x="${sXFront + wBox/2}" y="${rectTopY + rectH/2 + 8}" font-size="${fontM}" font-weight="bold" fill="#2e7d32" text-anchor="middle">Front: ${Math.round(rectH)} mm${fb.actualZawCount > 0 ? ` (${fb.actualZawCount} szt. zawiasów)` : ``}</text>`; 
                        fb.hinges.forEach(zaw => { 
                            let cy = hBox - zaw.bodyY; let color = zaw.shifted ? "#9c27b0" : "#2e7d32"; let puszkaX = sXFront + 22;  
                            svg += `<circle cx="${puszkaX}" cy="${cy}" r="17.5" fill="none" stroke="${color}" stroke-width="3"/><circle cx="${puszkaX}" cy="${cy}" r="3" fill="${color}"/><line x1="${puszkaX}" y1="${cy}" x2="${sXFront + wBox + 60}" y2="${cy}" stroke="${color}" stroke-dasharray="4,4" stroke-width="2"/><text x="${sXFront + wBox + 70}" y="${cy + 8}" font-size="${fontL}" font-weight="bold" fill="${color}" text-anchor="start">${Math.round(zaw.frontY)} (${Math.round(rectH - zaw.frontY)})${zaw.shifted ? " [KOREKTA]" : ""}</text>`; 
                        }); 
                    } else if(fb.type === 'drawers') { 
                        fb.drawers.forEach((dr, idx) => { 
                            let drH = dr.yEnd - dr.yStart; 
                            svg += `<rect x="${sXFront}" y="${hBox - dr.yEnd}" width="${wBox}" height="${drH}" fill="#e8f0fe" stroke="#1F4E79" stroke-width="${lineW}"/>`; 
                            let drTypeLabel = ""; 
                            if (fb.drawerMode === 'manual' && fb.manualFronts[idx]) { 
                                let tObj = sysDB.types.find(t => t.id === fb.manualFronts[idx].type); 
                                if(tObj) drTypeLabel = ` [Typ: ${tObj.label}]`; 
                            } 
                            svg += `<text x="${sXFront + wBox/2}" y="${hBox - dr.yEnd + drH/2 + 8}" font-size="${fontM}" font-weight="bold" fill="#1F4E79" text-anchor="middle">Szuflada ${idx+1} (F: ${Math.round(drH)}mm)${drTypeLabel} [NL: ${dr.currentNL}mm]</text>`; 
                        }); 
                    } 
                }); 
            } 
 
            svg += `</svg>`; document.getElementById('svgWrapper').innerHTML = svg; 
        } 
 
        window.onload = () => { initZoomPan(); run(); renderSavedCabinets(); toggleAutoZaw(); toggleBackFields(); }; 
    </script> 
</body> 
</html>
