<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Formatek i Półek (Bottom-Up Szuflady)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7f6; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1800px; margin: auto; display: flex; gap: 20px; flex-wrap: wrap; align-items: stretch; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; }
        .panel-left { flex: 1.2; min-width: 440px; max-width: 500px; }
        .panel-right { flex: 2.5; min-width: 600px; }
        .panel-bottom { flex: 100%; width: 100%; margin-top: 10px; }
        
        h2 { margin-top: 0; font-size: 1.2rem; color: #1F4E79; border-bottom: 2px solid #E2EFDA; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        h3 { font-size: 1rem; color: #555; margin-bottom: 10px; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-top: 10px; margin-bottom: 4px; color: #555; }
        input[type="number"], input[type="text"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; background: #f9fbfd; }
        input:focus, select:focus { outline: none; border-color: #1F4E79; background: #fff; }
        input[readonly] { background: #f0f0f0; border-color: #ddd; color: #777; cursor: not-allowed; }
        
        .view-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #e8f0fe; padding: 12px; border-radius: 6px; border-left: 4px solid #1F4E79; margin-bottom: 15px; }
        .view-options label { margin: 0; font-weight: bold; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #1F4E79; }
        .view-options input[type="checkbox"] { width: auto; accent-color: #1F4E79; transform: scale(1.2); margin:0; }

        .space-row { background: #f9fbfd; padding: 10px 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #eee; transition: 0.2s; }
        .space-row.locked { border-left: 4px solid #d32f2f; background: #fce8e8; }
        .space-row.resultant { border-left: 4px solid #f57c00; background: #fff3e0; }
        .space-row.drawer-active { border-left: 4px solid #2e7d32; background: #e8f5e9; }
        .space-header { display: flex; justify-content: space-between; align-items: center; }
        .space-row label.main-label { margin: 0; font-size: 0.9rem; color: #333; font-weight: bold; }
        .space-input-group { display: flex; gap: 8px; align-items: center; }
        .space-input-group input { width: 80px; text-align: center; font-weight: bold; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        
        button { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: #555; transition: 0.2s; }
        button:hover:not([disabled]) { background: #f0f0f0; }
        
        .lock-btn { width: 115px; }
        .lock-btn.locked { background: #d32f2f; color: white; border-color: #b71c1c; }
        .lock-btn.locked:hover { background: #b71c1c; }
        .lock-btn[disabled] { opacity: 0.6; cursor: not-allowed; border-color: #f57c00; color: #e65100; background: #ffe0b2; }
        
        .btn-primary { background: #1F4E79; color: white; border-color: #153a5b; padding: 10px 15px; width: 100%; font-size: 1rem; margin-top: 15px; }
        .btn-primary:hover { background: #153a5b; }
        
        .btn-print { background: #2e7d32; color: white; border-color: #1b5e20; }
        .btn-print:hover { background: #1b5e20; }
        
        .error-msg { display: none; background: #fce8e8; color: #d32f2f; font-weight: bold; padding: 10px; border-radius: 6px; border: 1px solid #d32f2f; margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        
        .saved-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .saved-item { background: #f9fbfd; border: 1px solid #ddd; padding: 15px; border-radius: 6px; border-left: 4px solid #f57c00; }
        .saved-item h4 { margin: 0 0 10px 0; color: #1F4E79; }
        .saved-item p { margin: 0 0 10px 0; font-size: 0.85rem; color: #555; }
        .saved-actions { display: flex; gap: 10px; }
        .btn-load { background: #e2efda; border-color: #2e7d32; color: #2e7d32; flex: 1; }
        .btn-delete { background: #fce8e8; border-color: #d32f2f; color: #d32f2f; }

        .svg-container { position: relative; overflow: hidden; background: #fafafa; border: 1px dashed #ccc; border-radius: 6px; flex: 1; min-height: 850px; cursor: grab; display: flex; justify-content: center; align-items: center; margin-top: 15px; }
        .svg-container:active { cursor: grabbing; }
        .svg-wrapper { width: 100%; height: 100%; transform-origin: center center; transition: transform 0.05s linear; pointer-events: none; }
        
        #printArea { display: none; }

        @media print {
            body { background: white; margin: 0; padding: 0; }
            .container { display: none !important; }
            #printArea { display: block !important; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: white; }
            #printArea svg { width: 100%; height: 100%; max-height: 98vh; }
            @page { margin: 0.5cm; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel panel-left">
            <h2>Opcje i Widoki</h2>
            
            <div class="view-options">
                <label><input type="checkbox" id="sClearance" checked onchange="run()"> Światło (Wymiar)</label>
                <label><input type="checkbox" id="sShelfAxis" checked onchange="run()"> Oś półki</label>
                <label><input type="checkbox" id="sShelfHoles" checked onchange="run()"> Otwory podpórki</label>
                <label><input type="checkbox" id="sDistances" checked onchange="run()"> Dystanse podpórek</label>
                <label><input type="checkbox" id="sHingeAxis" checked onchange="run()"> Prowadnik (oś)</label>
                <label><input type="checkbox" id="sHingeHoles" checked onchange="run()"> Prowadnik (otwory)</label>
                <label><input type="checkbox" id="sFront" checked onchange="run()"> Rzut Frontu</label>
                <label><input type="checkbox" id="sDrawerTopHoles" checked onchange="run()"> Szuflada - Otwór górny</label>
                <label><input type="checkbox" id="sDrawerBottomHoles" checked onchange="run()"> Szuflada - Otwór dolny (32)</label>
            </div>

            <h3>Parametry Korpusu</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Wysokość (H)</label><input type="number" id="hBox" value="2000" min="0" oninput="resetLocksAndRun()"></div>
                <div><label>Szerokość (W)</label><input type="number" id="wBox" value="600" min="0" oninput="run()"></div>
                <div><label>Głębokość boku (D)</label><input type="number" id="dBox" value="510" min="0" oninput="run()"></div>
                <div><label>Ilość półek</label><input type="number" id="qPol" value="4" min="0" oninput="resetLocksAndRun()"></div>
                <div><label>Typ korpusu</label>
                    <select id="kTyp" onchange="resetLocksAndRun()">
                        <option value="wpuszczane">Wpuszczane</option>
                        <option value="nakladane">Nakładane</option>
                    </select>
                </div>
                <div><label>Wysokość cokołu</label><input type="number" id="cokol" value="100" min="0" oninput="resetLocksAndRun()"></div>
                <div><label>Offset podpórki (Dół)</label><input type="number" id="offsetPodporki" value="3" oninput="run()"></div>
                <div><label>Grubość płyty (korpus)</label><input type="number" id="tBoard" value="18" min="0" oninput="run()"></div>
            </div>

            <h3>Fronty, Zawiasy i Okucia</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Ilość zawiasów / drzwi</label><input type="number" id="qZaw" value="4" min="0" max="8" oninput="run()"></div>
                <div><label>Strefa ochrony zawiasu</label><input type="number" id="cMargin" value="35" min="0" oninput="run()"></div>
                <div><label>Puszka (od dołu drzwi)</label><input type="number" id="zOffD" value="100" min="0" oninput="run()"></div>
                <div><label>Puszka (od góry drzwi)</label><input type="number" id="zOffG" value="100" min="0" oninput="run()"></div>
                <div><label>Luz frontu (Dół)</label><input type="number" id="fLuzD" value="0" min="0" oninput="run()"></div>
                <div><label>Luz frontu (Góra)</label><input type="number" id="fLuzG" value="3" min="0" oninput="run()"></div>
                <div style="grid-column: span 2;"><label>Szczelina między frontami</label><input type="number" id="luzFrontow" value="3" min="0" oninput="run()"></div>
                
                <div style="grid-column: span 2;">
                    <label>System prowadnic szuflad</label>
                    <select id="drawerSystem" onchange="updateDrawerFields(); run();">
                        <option value="44">GTV Axis Pro / Modern Box (Górny: 44mm)</option>
                        <option value="54">Blum Merivobox (Górny: 54mm)</option>
                        <option value="33">Blum Antaro / Tandembox (Górny: 33mm)</option>
                        <option value="custom">Inne (Własny wymiar górnego otworu)</option>
                    </select>
                </div>
                <div id="customDrawerField" style="grid-column: span 2; display:none;">
                    <label>Własna wysokość otworu górnego (mm)</label>
                    <input type="number" id="customDrawerAxis" value="44" min="0" oninput="run()">
                </div>
            </div>

            <h3>Manager Przestrzeni</h3>
            <div id="errorBox" class="error-msg"></div>
            <div id="spaceControls"></div>

            <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
            <label>Nazwa do zapisu projektu:</label>
            <input type="text" id="cabName" value="Szafka z szufladami i półkami" placeholder="np. Szafka kuchenna lewa">
            <button class="btn-primary" onclick="saveCabinet()">💾 Zapisz do Bazy</button>
        </div>
        
        <div class="panel panel-right">
            <h2>
                Widok Warsztatowy (CAD 1:1)
                <div style="display:flex; gap: 5px; align-items:center;">
                    <select id="printType" style="width:auto; padding:5px; font-size:0.85rem; margin-right:5px;">
                        <option value="all">Drukuj: Wszystko</option>
                        <option value="interior">Drukuj: Tylko Wnętrze</option>
                        <option value="side">Drukuj: Tylko Bok</option>
                        <option value="front">Drukuj: Tylko Front</option>
                    </select>
                    <button class="btn-print" onclick="printView()">🖨️ Drukuj</button>
                    <span style="color:#ddd; margin: 0 5px;">|</span>
                    <button onclick="resetZoom()">⟲ Reset</button>
                    <button onclick="zoomManual(0.2)">+</button>
                    <button onclick="zoomManual(-0.2)">-</button>
                </div>
            </h2>
            <div id="svgContainer" class="svg-container">
                <div id="svgWrapper" class="svg-wrapper"></div>
            </div>
        </div>

        <div class="panel panel-bottom">
            <h2>Baza zapisanych projektów</h2>
            <div id="savedList" class="saved-list"></div>
        </div>
    </div>

    <div id="printArea"></div>

    <script>
        let zScale = 1; let panX = 0; let panY = 0; let isDragging = false; let startX = 0; let startY = 0;
        let spaceLocks = [];

        function val(id) { 
            let v = parseFloat(document.getElementById(id).value); 
            return isNaN(v) ? 0 : v; 
        }

        function isChecked(id) { return document.getElementById(id).checked; }

        let errorTimeout;
        function showError(msg) {
            let errBox = document.getElementById('errorBox');
            errBox.innerText = msg; errBox.style.display = 'block';
            clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => { errBox.style.display = 'none'; }, 4000);
        }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }

        function initZoomPan() {
            const container = document.getElementById('svgContainer');
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                zScale *= Math.exp((e.deltaY < 0 ? 1 : -1) * 0.1);
                zScale = Math.min(Math.max(0.1, zScale), 10); 
                applyTransform();
            });
            container.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
                isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return; panX = e.clientX - startX; panY = e.clientY - startY; applyTransform();
            });
            window.addEventListener('mouseup', () => { isDragging = false; });
            container.addEventListener('mouseleave', () => { isDragging = false; });
        }

        function zoomManual(amount) { zScale = Math.min(Math.max(0.1, zScale + amount), 10); applyTransform(); }
        function resetZoom() { zScale = 1; panX = 0; panY = 0; applyTransform(); }
        function applyTransform() { document.getElementById('svgWrapper').style.transform = `translate(${panX}px, ${panY}px) scale(${zScale})`; }

        function updateDrawerFields() {
            let system = document.getElementById('drawerSystem').value;
            let field = document.getElementById('customDrawerField');
            if(system === 'custom') {
                field.style.display = 'block';
            } else {
                field.style.display = 'none';
            }
        }

        function getTopHoleOffset() {
            let system = document.getElementById('drawerSystem').value;
            if(system === 'custom') {
                return val('customDrawerAxis');
            }
            return parseFloat(system);
        }

        function saveCabinet() {
            let cab = {
                id: Date.now(),
                name: document.getElementById('cabName').value || `Szafka ${val('hBox')}x${val('wBox')}`,
                kTyp: document.getElementById('kTyp').value,
                hBox: val('hBox'), wBox: val('wBox'), dBox: val('dBox'),
                qPol: val('qPol'), tBoard: val('tBoard'), offsetPodporki: val('offsetPodporki'), cokol: val('cokol'),
                qZaw: val('qZaw'), zOffD: val('zOffD'), zOffG: val('zOffG'),
                fLuzD: val('fLuzD'), fLuzG: val('fLuzG'), cMargin: val('cMargin'),
                luzFrontow: val('luzFrontow'), drawerSystem: document.getElementById('drawerSystem').value,
                customDrawerAxis: val('customDrawerAxis'),
                spaceLocks: JSON.parse(JSON.stringify(spaceLocks))
            };
            
            let saved = JSON.parse(localStorage.getItem('cad_cabinets_v5')) || [];
            saved.push(cab);
            localStorage.setItem('cad_cabinets_v5', JSON.stringify(saved));
            renderSavedCabinets();
            alert("Projekt zapisany pomyślnie w bazie lokalnej!");
        }

        function loadCabinet(id) {
            let saved = JSON.parse(localStorage.getItem('cad_cabinets_v5')) || [];
            let cab = saved.find(c => c.id === id);
            if(!cab) return;

            document.getElementById('cabName').value = cab.name;
            document.getElementById('kTyp').value = cab.kTyp;
            document.getElementById('hBox').value = cab.hBox;
            document.getElementById('wBox').value = cab.wBox;
            document.getElementById('dBox').value = cab.dBox;
            document.getElementById('qPol').value = cab.qPol;
            document.getElementById('tBoard').value = cab.tBoard;
            document.getElementById('offsetPodporki').value = cab.offsetPodporki;
            document.getElementById('cokol').value = cab.cokol !== undefined ? cab.cokol : 100;
            document.getElementById('qZaw').value = cab.qZaw;
            document.getElementById('zOffD').value = cab.zOffD;
            document.getElementById('zOffG').value = cab.zOffG;
            document.getElementById('fLuzD').value = cab.fLuzD !== undefined ? cab.fLuzD : 0;
            document.getElementById('fLuzG').value = cab.fLuzG;
            document.getElementById('cMargin').value = cab.cMargin !== undefined ? cab.cMargin : 35;
            document.getElementById('luzFrontow').value = cab.luzFrontow !== undefined ? cab.luzFrontow : 3;
            document.getElementById('drawerSystem').value = cab.drawerSystem !== undefined ? cab.drawerSystem : "44";
            document.getElementById('customDrawerAxis').value = cab.customDrawerAxis !== undefined ? cab.customDrawerAxis : 44;

            updateDrawerFields();

            spaceLocks = cab.spaceLocks.map(s => ({
                locked: s.locked || false,
                manualVal: s.manualVal || 0,
                currentVal: s.currentVal || 0,
                hasDrawers: s.hasDrawers || false,
                drawerMode: s.drawerMode || 'auto',
                qDrawers: s.qDrawers || 3,
                manualFronts: s.manualFronts || [200, 200, 200],
                topGapToAxis: s.topGapToAxis !== undefined ? s.topGapToAxis : 12
            }));
            
            run(); 
            window.scrollTo(0, 0); 
        }

        function deleteCabinet(id) {
            if(!confirm("Czy na pewno chcesz usunąć ten zapisany szablon?")) return;
            let saved = JSON.parse(localStorage.getItem('cad_cabinets_v5')) || [];
            saved = saved.filter(c => c.id !== id);
            localStorage.setItem('cad_cabinets_v5', JSON.stringify(saved));
            renderSavedCabinets();
        }

        function renderSavedCabinets() {
            let saved = JSON.parse(localStorage.getItem('cad_cabinets_v5')) || [];
            let listHtml = '';
            
            if (saved.length === 0) {
                listHtml = '<p style="color:#777;">Brak zapisanych projektów w bazie przeglądarki.</p>';
            } else {
                saved.forEach(cab => {
                    let locksInfo = cab.spaceLocks.filter(s => s.locked).length;
                    let drawersInfo = cab.spaceLocks.filter(s => s.hasDrawers).length;
                    listHtml += `
                        <div class="saved-item">
                            <h4>${cab.name}</h4>
                            <p>Gabaryt: ${cab.hBox}x${cab.wBox}x${cab.dBox} mm<br>
                               Półki: ${cab.qPol} | Przestrzenie z szufladami: ${drawersInfo}<br>
                               Blokady wymiaru: ${locksInfo}
                            </p>
                            <div class="saved-actions">
                                <button class="btn-load" onclick="loadCabinet(${cab.id})">Wczytaj projekt</button>
                                <button class="btn-delete" onclick="deleteCabinet(${cab.id})">Usuń</button>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('savedList').innerHTML = listHtml;
        }

        function printView() {
            let type = document.getElementById('printType').value;
            let svgNode = document.querySelector('#svgWrapper svg').cloneNode(true);
            
            let hBox = val('hBox'); let wBox = val('wBox'); let dBox = val('dBox');
            let sXBok = wBox + 300; 
            let sXFront = sXBok + dBox + 1200; 

            if (type === 'interior') {
                svgNode.setAttribute('viewBox', `-100 -120 ${wBox + 200} ${hBox + 250}`);
            } else if (type === 'side') {
                svgNode.setAttribute('viewBox', `${sXBok - 200} -120 ${dBox + 900} ${hBox + 250}`);
            } else if (type === 'front') {
                svgNode.setAttribute('viewBox', `${sXFront - 100} -120 ${wBox + 300} ${hBox + 250}`);
            } 

            document.getElementById('printArea').innerHTML = '';
            document.getElementById('printArea').appendChild(svgNode);
            window.print();
        }

        function resetLocksAndRun() {
            let qPol = val('qPol'); let totalSpaces = qPol + 1;
            spaceLocks = [];
            for(let i = 0; i < totalSpaces; i++) {
                spaceLocks.push({ 
                    locked: false, manualVal: 0, currentVal: 0,
                    hasDrawers: false, drawerMode: 'auto', qDrawers: 3,
                    manualFronts: [200, 200, 140], topGapToAxis: 12
                });
            }
            hideError(); run();
        }

        function toggleLock(index) {
            hideError();
            let lockedCount = spaceLocks.filter(s => s.locked).length;
            if(spaceLocks[index].locked) {
                spaceLocks[index].locked = false;
            } else {
                if (lockedCount >= spaceLocks.length - 1) { showError("Ostatnia wolna przestrzeń musi pozostać jako automatyczna wypadkowa."); return; }
                spaceLocks[index].locked = true;
                spaceLocks[index].manualVal = spaceLocks[index].currentVal;
            }
            run();
        }
        
        function toggleDrawers(index) {
            spaceLocks[index].hasDrawers = !spaceLocks[index].hasDrawers;
            run();
        }
        
        function changeDrawerMode(index, mode) {
            spaceLocks[index].drawerMode = mode;
            if(mode === 'manual') spaceLocks[index].locked = true;
            run();
        }

        function updateDrawerCount(index, value) {
            let q = parseInt(value);
            if(!isNaN(q) && q > 0) spaceLocks[index].qDrawers = q;
            run();
        }

        function updateManualFront(spaceIdx, frontIdx, value) {
            let v = parseFloat(value);
            if(!isNaN(v) && v > 0) spaceLocks[spaceIdx].manualFronts[frontIdx] = v;
            run();
        }

        function addManualFront(spaceIdx) {
            spaceLocks[spaceIdx].manualFronts.push(200);
            run();
        }

        function removeManualFront(spaceIdx) {
            if(spaceLocks[spaceIdx].manualFronts.length > 1) {
                spaceLocks[spaceIdx].manualFronts.pop();
            }
            run();
        }

        function updateTopGap(spaceIdx, value) {
            let v = parseFloat(value);
            if(!isNaN(v)) spaceLocks[spaceIdx].topGapToAxis = v;
            run();
        }

        function handleSpaceInput(index, value) {
            let num = parseFloat(value);
            if(isNaN(num) || num < 0) { spaceLocks[index].locked = false; hideError(); run(); return; }
            
            let isCurrentlyLocked = spaceLocks[index].locked;
            let lockedCount = spaceLocks.filter(s => s.locked).length;
            if (!isCurrentlyLocked && lockedCount >= spaceLocks.length - 1) {
                showError("Przestrzeń automatyczna/wypadkowa. Odblokuj inne, aby zmienić ten wymiar."); run(); return;
            }

            let hBox = val('hBox'); let tBoard = val('tBoard'); let qPol = val('qPol'); let cokol = val('cokol');
            let innerSpace = hBox - 2*tBoard - cokol;
            let otherLockedSum = 0;
            for(let i = 0; i < spaceLocks.length; i++) {
                if(i !== index && spaceLocks[i].locked) otherLockedSum += spaceLocks[i].manualVal;
            }

            let maxAllowed = innerSpace - (qPol * tBoard) - otherLockedSum;
            if (num > maxAllowed) { showError(`Brak miejsca w świetle korpusu! Maksymalnie dostępno: ${maxAllowed} mm.`); num = maxAllowed; } 
            else hideError();

            spaceLocks[index].locked = true; spaceLocks[index].manualVal = num; run();
        }

        function run() {
            let kTyp = document.getElementById('kTyp').value;
            let hBox = val('hBox'); let wBox = val('wBox'); let dBox = val('dBox'); let tBoard = val('tBoard');
            let qPol = val('qPol'); let offsetPodporki = val('offsetPodporki'); let cokol = val('cokol');

            let sClearance = isChecked('sClearance'); let sShelfAxis = isChecked('sShelfAxis');
            let sShelfHoles = isChecked('sShelfHoles'); let sDistances = isChecked('sDistances');
            let sHingeAxis = isChecked('sHingeAxis'); let sHingeHoles = isChecked('sHingeHoles');
            let sFront = isChecked('sFront');
            let sDrawerTopHoles = isChecked('sDrawerTopHoles');
            let sDrawerBottomHoles = isChecked('sDrawerBottomHoles');

            let topHoleOffset = getTopHoleOffset();
            let fLuzD = val('fLuzD'); let fLuzG = val('fLuzG'); let luzFrontow = val('luzFrontow');
            
            let totalSpaces = qPol + 1;
            if(spaceLocks.length !== totalSpaces) { resetLocksAndRun(); return; }

            // --- 1. PRE-KALKULACJA "BOTTOM-UP" DLA SZUFLAD WŁASNYCH ---
            let facadeShift = 0;
            for(let i = 0; i < totalSpaces; i++) {
                if(spaceLocks[i].hasDrawers && spaceLocks[i].drawerMode === 'manual') {
                    let sumFronts = spaceLocks[i].manualFronts.reduce((a,b)=>a+b, 0);
                    let totalLuz = (spaceLocks[i].manualFronts.length - 1) * luzFrontow;
                    
                    let reqSpace = 0;
                    if(i === 0) {
                        reqSpace = fLuzD + sumFronts + totalLuz + spaceLocks[i].topGapToAxis - 1.5 * tBoard;
                    } else {
                        reqSpace = facadeShift + sumFronts + totalLuz + spaceLocks[i].topGapToAxis + (luzFrontow/2) - tBoard;
                    }
                    
                    spaceLocks[i].locked = true;
                    spaceLocks[i].manualVal = Math.round(reqSpace * 10) / 10;
                    
                    facadeShift = (luzFrontow / 2) - spaceLocks[i].topGapToAxis;
                } else {
                    facadeShift = 0; 
                }
            }

            // --- 2. DYSTRYBUCJA WOLNEGO ŚWIATŁA (TOP-DOWN) ---
            let innerSpace = hBox - 2*tBoard - cokol;
            let usedSpace = 0; let unlockedCount = 0;
            for(let i = 0; i < totalSpaces; i++) {
                if(spaceLocks[i].locked) usedSpace += spaceLocks[i].manualVal; 
                else unlockedCount++;
            }

            let remainingForAuto = innerSpace - (qPol * tBoard) - usedSpace;
            let autoVal = (unlockedCount > 0 && remainingForAuto > 0) ? Math.round(remainingForAuto / unlockedCount) : 0;
            
            let accumulatedAuto = 0;
            for(let i = 0; i < totalSpaces; i++) {
                if(spaceLocks[i].locked) spaceLocks[i].currentVal = spaceLocks[i].manualVal;
                else {
                    if (unlockedCount === 1) spaceLocks[i].currentVal = remainingForAuto - accumulatedAuto;
                    else { spaceLocks[i].currentVal = autoVal; accumulatedAuto += autoVal; unlockedCount--; }
                }
            }
            unlockedCount = spaceLocks.filter(s => !s.locked).length;

            // Generowanie HTML Managera Przestrzeni
            let controlsHtml = '';
            for(let i = 0; i < totalSpaces; i++) {
                let isTop = (i === totalSpaces - 1); let isBottom = (i === 0);
                let label = `Światło ${i+1}` + (isBottom ? ` (Dół)` : (isTop ? ` (Góra)` : ``));
                let isLocked = spaceLocks[i].locked;
                let isOnlyUnlocked = (!isLocked && unlockedCount === 1);
                let isDrawers = spaceLocks[i].hasDrawers;
                let drawerMode = spaceLocks[i].drawerMode;
                let isManual = isDrawers && drawerMode === 'manual';
                
                let rowClass = 'space-row';
                if (isLocked) rowClass += ' locked';
                if (isDrawers) rowClass += ' drawer-active';
                if (isOnlyUnlocked && !isDrawers) rowClass += ' resultant';
                
                let btnClass = isLocked ? 'lock-btn locked' : 'lock-btn';
                let btnText = isLocked ? '🔒 Odblokuj' : '🔓 Zablokuj';
                let inputProps = (isOnlyUnlocked || isManual) ? 'readonly' : '';
                if(isOnlyUnlocked) inputProps += ' title="Wypadkowa (Auto)"';
                if(isManual) inputProps += ' title="Zablokowane przez fronty (Bottom-Up)"';
                
                let btnProps = (isOnlyUnlocked || isManual) ? 'disabled' : `onclick="toggleLock(${i})"`;
                if (isOnlyUnlocked) btnText = '⭐ Wypadkowa';
                if (isManual) btnText = '🧱 Bottom-Up';

                let drawerHtml = `
                    <div style="margin-top: 6px; display: flex; flex-direction: column; gap: 4px; background: #fff; padding: 6px; border-radius: 4px; border: 1px solid #ddd;">
                        <div style="display:flex; align-items:center; gap: 10px;">
                            <label style="cursor:pointer; display:flex; align-items:center; gap:4px; margin:0; font-weight:normal; color:#1F4E79;">
                                <input type="checkbox" ${isDrawers ? 'checked' : ''} onchange="toggleDrawers(${i})"> <b>Moduł Szuflad</b>
                            </label>
                            ${isDrawers ? `
                                <select onchange="changeDrawerMode(${i}, this.value)" style="padding: 2px 5px; font-size:0.8rem; width:auto;">
                                    <option value="auto" ${drawerMode==='auto'?'selected':''}>Równomiernie (Auto)</option>
                                    <option value="manual" ${drawerMode==='manual'?'selected':''}>Własne fronty (Bottom-Up)</option>
                                </select>
                            ` : ''}
                        </div>
                `;

                if (isDrawers) {
                    if (drawerMode === 'auto') {
                        drawerHtml += `
                        <div style="display:flex; gap: 8px; align-items:center; margin-top:4px;">
                            <span style="font-size:0.8rem;">Ilość:</span>
                            <input type="number" value="${spaceLocks[i].qDrawers}" min="1" onchange="updateDrawerCount(${i}, this.value)" style="width: 50px; padding: 2px; text-align:center;">
                            <span style="font-size:0.8rem;">szt.</span>
                        </div>`;
                    } else {
                        drawerHtml += `<div style="font-size:0.8rem; margin-top:6px; border-top: 1px dashed #eee; padding-top:6px;">`;
                        spaceLocks[i].manualFronts.forEach((mf, fIdx) => {
                            let lbl = (fIdx === 0) ? `Front ${fIdx+1} (Dół)` : `Front ${fIdx+1}`;
                            drawerHtml += `
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                                    <span>${lbl}:</span>
                                    <input type="number" value="${mf}" onchange="updateManualFront(${i}, ${fIdx}, this.value)" style="width: 60px; padding: 2px; text-align:center;">
                                </div>
                            `;
                        });
                        drawerHtml += `
                            <div style="display:flex; gap:5px; margin-bottom: 8px;">
                                <button type="button" onclick="addManualFront(${i})" style="flex:1; padding:2px;">+ Dodaj front</button>
                                <button type="button" onclick="removeManualFront(${i})" style="flex:1; padding:2px;">- Usuń</button>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; background:#e8f0fe; padding:4px; border-radius:4px;">
                                <span title="Dystans od krawędzi najwyższego frontu do osi półki nad szufladami">Luz do osi półki:</span>
                                <div>
                                    <input type="number" value="${spaceLocks[i].topGapToAxis}" onchange="updateTopGap(${i}, this.value)" style="width: 50px; padding: 2px; text-align:center;"> mm
                                </div>
                            </div>
                        </div>`;
                    }
                }
                drawerHtml += `</div>`;

                controlsHtml += `
                    <div class="${rowClass}">
                        <div class="space-header">
                            <div style="flex:1;">
                                <label class="main-label">${label}</label>
                                ${drawerHtml}
                            </div>
                            <div class="space-input-group" style="align-self: flex-start; margin-top:5px;">
                                <input type="number" value="${spaceLocks[i].currentVal}" onchange="handleSpaceInput(${i}, this.value)" ${inputProps}>
                                <button class="${btnClass}" ${btnProps}>${btnText}</button>
                            </div>
                        </div>
                    </div>`;
            }
            document.getElementById('spaceControls').innerHTML = controlsHtml;

            // --- KOORDYNATY WNĘTRZA KORPUSU ---
            let offsetOdDolu = (kTyp === 'nakladane') ? cokol : tBoard + cokol;
            let osie = [];
            let spacesBoundary = []; 
            
            let currentBottom = offsetOdDolu;
            for(let i = 0; i < totalSpaces; i++) {
                let h = spaceLocks[i].currentVal;
                spacesBoundary.push({
                    index: i,
                    hasDrawers: spaceLocks[i].hasDrawers,
                    drawerMode: spaceLocks[i].drawerMode,
                    manualFronts: spaceLocks[i].manualFronts,
                    qDrawers: spaceLocks[i].qDrawers,
                    yStart: currentBottom, 
                    yEnd: currentBottom + h 
                });
                currentBottom += h; 
                
                if (i < qPol) { 
                    let osSrodkowa = currentBottom - offsetPodporki;
                    osie.push({ spod: currentBottom, os: osSrodkowa, osPrawdziwa: currentBottom + tBoard/2 });
                    currentBottom += tBoard; 
                }
            }

            // --- BUDOWANIE CIĄGŁEJ FASADY FRONTÓW ---
            let frontBlocks = [];
            let currentDoorBlock = null;
            let doorZawiasy = [];
            let drawerGuides = [];
            let cMargin = val('cMargin') || 35;
            
            let facadeY = cokol + fLuzD;

            for(let i = 0; i < totalSpaces; i++) {
                let sb = spacesBoundary[i];
                let isTop = (i === totalSpaces - 1);
                
                let defaultEndY = isTop ? hBox - fLuzG : sb.yEnd + (tBoard/2) - (luzFrontow/2);
                
                if (sb.hasDrawers) {
                    if (currentDoorBlock) { frontBlocks.push(currentDoorBlock); currentDoorBlock = null; }
                    
                    let blockEndY = defaultEndY;
                    if (sb.drawerMode === 'manual') {
                        let sumF = sb.manualFronts.reduce((a,b)=>a+b, 0);
                        let totalL = (sb.manualFronts.length - 1) * luzFrontow;
                        blockEndY = facadeY + sumF + totalL;
                    }
                    
                    frontBlocks.push({ 
                        type: 'drawers', 
                        drawerMode: sb.drawerMode,
                        manualFronts: sb.manualFronts,
                        qDrawers: sb.qDrawers,
                        yStart: facadeY, 
                        yEnd: blockEndY, 
                        interiorBottom: sb.yStart 
                    });
                    facadeY = blockEndY + luzFrontow;
                } else {
                    if (!currentDoorBlock) {
                        currentDoorBlock = { type: 'door', yStart: facadeY, yEnd: defaultEndY };
                    } else {
                        currentDoorBlock.yEnd = defaultEndY;
                    }
                    facadeY = defaultEndY + luzFrontow;
                }
            }
            if(currentDoorBlock) frontBlocks.push(currentDoorBlock);

            // Obliczanie detali wewnątrz bloków frontów
            let qZaw = val('qZaw'); let zOffD = val('zOffD'); let zOffG = val('zOffG'); 

            frontBlocks.forEach(fb => {
                let fH_total = fb.yEnd - fb.yStart;
                
                if(fb.type === 'drawers') {
                    fb.drawers = [];
                    if (fb.drawerMode === 'manual') {
                        let currY = fb.yStart;
                        for(let j=0; j < fb.manualFronts.length; j++) {
                            let fH = fb.manualFronts[j];
                            let dTop = currY + fH;
                            
                            let guideTopY = currY + topHoleOffset;
                            let guideBottomY = currY + 32;
                            
                            if (j === 0) { // Zabezpieczenie pierwszej szuflady względem wieńca
                                guideTopY = Math.max(guideTopY, fb.interiorBottom + topHoleOffset);
                                guideBottomY = Math.max(guideBottomY, fb.interiorBottom + 32);
                            }
                            fb.drawers.push({ yStart: currY, yEnd: dTop, guideTop: guideTopY, guideBottom: guideBottomY });
                            drawerGuides.push({ axisYTop: guideTopY, axisYBottom: guideBottomY });
                            currY = dTop + luzFrontow;
                        }
                    } else { // AUTO
                        let dLuzTotal = (fb.qDrawers - 1) * luzFrontow;
                        let dFrontH = (fH_total - dLuzTotal) / fb.qDrawers;
                        
                        let currY = fb.yStart;
                        for(let j=0; j < fb.qDrawers; j++) {
                            let dTop = currY + dFrontH;
                            let guideTopY = currY + topHoleOffset;
                            let guideBottomY = currY + 32;
                            
                            if (j === 0) {
                                guideTopY = Math.max(guideTopY, fb.interiorBottom + topHoleOffset);
                                guideBottomY = Math.max(guideBottomY, fb.interiorBottom + 32);
                            }
                            fb.drawers.push({ yStart: currY, yEnd: dTop, guideTop: guideTopY, guideBottom: guideBottomY });
                            drawerGuides.push({ axisYTop: guideTopY, axisYBottom: guideBottomY });
                            currY = dTop + luzFrontow;
                        }
                    }
                } 
                else if(fb.type === 'door') {
                    let hinges = [];
                    if (qZaw > 0) {
                        let hgBaseFront = [];
                        if (qZaw === 1) {
                            hgBaseFront.push({ offset: fH_total/2, isTop: false });
                        } else {
                            hgBaseFront.push({ offset: zOffD, isTop: false }); 
                            if (qZaw > 2) {
                                let step = (fH_total - zOffG - zOffD) / (qZaw - 1);
                                for (let k = 1; k < qZaw - 1; k++) hgBaseFront.push({ offset: zOffD + k * step, isTop: false });
                            }
                            hgBaseFront.push({ offset: fH_total - zOffG, isTop: true }); 
                        }
                        
                        hgBaseFront.forEach(hg => {
                            let mY = fb.yStart + hg.offset; 
                            let collision = true; let attempts = 0; let isShifted = false;
                            
                            while(collision && attempts < 15) {
                                collision = false;
                                for (let p of osie) {
                                    [-32, 0, 32].forEach(off => {
                                        if (Math.abs(mY - (p.osPrawdziwa + off)) < cMargin) collision = true;
                                    });
                                }
                                for (let dg of drawerGuides) {
                                    if (Math.abs(mY - dg.axisYTop) < cMargin || Math.abs(mY - dg.axisYBottom) < cMargin) {
                                        collision = true;
                                    }
                                }
                                if (collision) {
                                    isShifted = true;
                                    mY += hg.isTop ? -32 : 32; 
                                }
                                attempts++;
                            }
                            let roundedY = Math.round(mY);
                            hinges.push({ bodyY: roundedY, frontY: Math.round(roundedY - fb.yStart), shifted: isShifted, isTop: hg.isTop });
                        });
                    }
                    fb.hinges = hinges;
                    doorZawiasy.push(...hinges);
                }
            });

            // --- GENEROWANIE SVG ---
            let sXCab = 0; let sXBok = wBox + 300; let sXFront = sXBok + dBox + 1200; 
            let viewTotalW = sFront ? (sXFront + wBox + 500) : (sXBok + dBox + 1300); 
            let viewTotalH = hBox + 300;         
            
            let svg = `<svg viewBox="-150 -150 ${viewTotalW} ${viewTotalH}" class="svg-drawing" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 2 L 10 5 L 0 8 Z" fill="#555" /></marker>
                <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 2 L 10 5 L 0 8 Z" fill="#d32f2f" /></marker>
                <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 2 L 10 5 L 0 8 Z" fill="#2e7d32" /></marker>
            </defs>`;

            let fontL = 28; let fontM = 24; let fontS = 20; let lineW = 3;

            svg += `<text x="${sXCab + wBox/2}" y="-80" font-size="36" font-weight="bold" fill="#1F4E79" text-anchor="middle">KORPUS WNĘTRZE</text>`;
            svg += `<text x="${sXBok + dBox/2}" y="-80" font-size="36" font-weight="bold" fill="#1F4E79" text-anchor="middle">BOK SZAFY</text>`;

            let innerX = sXCab + tBoard; let innerW = wBox - 2*tBoard; let centerX = sXCab + wBox/2;
            
            // --- 1. KORPUS ---
            let yBottomWieniec = hBox - tBoard - cokol;
            if(kTyp === 'wpuszczane') {
                svg += `<rect x="${sXCab}" y="0" width="${tBoard}" height="${hBox}" fill="#f9fbfd" stroke="#333" stroke-width="${lineW}"/>`;
                svg += `<rect x="${sXCab + wBox - tBoard}" y="0" width="${tBoard}" height="${hBox}" fill="#f9fbfd" stroke="#333" stroke-width="${lineW}"/>`;
                svg += `<rect x="${innerX}" y="0" width="${innerW}" height="${tBoard}" fill="#e8f0fe" stroke="#1F4E79" stroke-width="${lineW}"/>`;
                svg += `<rect x="${innerX}" y="${yBottomWieniec}" width="${innerW}" height="${tBoard}" fill="#e8f0fe" stroke="#1F4E79" stroke-width="${lineW}"/>`;
            } else {
                svg += `<rect x="${sXCab}" y="0" width="${wBox}" height="${tBoard}" fill="#e8f0fe" stroke="#1F4E79" stroke-width="${lineW}"/>`;
                svg += `<rect x="${sXCab}" y="${yBottomWieniec}" width="${wBox}" height="${tBoard}" fill="#e8f0fe" stroke="#1F4E79" stroke-width="${lineW}"/>`;
                svg += `<rect x="${sXCab}" y="${tBoard}" width="${tBoard}" height="${hBox - 2*tBoard - cokol}" fill="#f9fbfd" stroke="#333" stroke-width="${lineW}"/>`;
                svg += `<rect x="${sXCab + wBox - tBoard}" y="${tBoard}" width="${tBoard}" height="${hBox - 2*tBoard - cokol}" fill="#f9fbfd" stroke="#333" stroke-width="${lineW}"/>`;
            }

            let currentFloorSVG = yBottomWieniec; 
            osie.forEach((data, i) => {
                let ySpodSVG = hBox - data.spod; 
                svg += `<rect x="${innerX}" y="${ySpodSVG - tBoard}" width="${innerW}" height="${tBoard}" fill="#2F5597" opacity="0.4" stroke="#1F4E79" stroke-width="2"/>`;
                if (sClearance) {
                    let midY = (currentFloorSVG + ySpodSVG) / 2;
                    let isLocked = spaceLocks[i].locked;
                    let strokeColor = isLocked ? "#d32f2f" : "#555";
                    let arrow = isLocked ? "url(#arrow-red)" : "url(#arrow)";
                    svg += `<line x1="${centerX}" y1="${ySpodSVG}" x2="${centerX}" y2="${currentFloorSVG}" stroke="${strokeColor}" stroke-width="3" marker-start="${arrow}" marker-end="${arrow}"/>`;
                    svg += `<rect x="${centerX - 40}" y="${midY - 20}" width="80" height="40" fill="#fff" opacity="0.9" rx="6"/>`;
                    svg += `<text x="${centerX}" y="${midY + fontM/3}" font-size="${fontM}" font-weight="bold" fill="${strokeColor}" text-anchor="middle">${spaceLocks[i].currentVal}</text>`;
                    if(isLocked) svg += `<text x="${centerX + 50}" y="${midY + fontM/3}" font-size="${fontM}" fill="#d32f2f">🔒</text>`;
                }
                currentFloorSVG = ySpodSVG - tBoard; 
            });
            
            let topCeilingSVG = tBoard;
            if (currentFloorSVG > topCeilingSVG && sClearance) {
                let midTopY = (currentFloorSVG + topCeilingSVG) / 2;
                let isLocked = spaceLocks[qPol].locked;
                let strokeColor = isLocked ? "#d32f2f" : "#555";
                let arrow = isLocked ? "url(#arrow-red)" : "url(#arrow)";
                svg += `<line x1="${centerX}" y1="${topCeilingSVG}" x2="${centerX}" y2="${currentFloorSVG}" stroke="${strokeColor}" stroke-width="3" marker-start="${arrow}" marker-end="${arrow}"/>`;
                svg += `<rect x="${centerX - 40}" y="${midTopY - 20}" width="80" height="40" fill="#fff" opacity="0.9" rx="6"/>`;
                svg += `<text x="${centerX}" y="${midTopY + fontM/3}" font-size="${fontM}" font-weight="bold" fill="${strokeColor}" text-anchor="middle">${spaceLocks[qPol].currentVal}</text>`;
                if(isLocked) svg += `<text x="${centerX + 50}" y="${midTopY + fontM/3}" font-size="${fontM}" fill="#d32f2f">🔒</text>`;
            }

            // --- 2. RZUT BOKU ---
            let sideBottom = (kTyp === 'nakladane') ? cokol + tBoard : 0;
            let sideTop = (kTyp === 'nakladane') ? hBox - tBoard : hBox;
            let hBok = sideTop - sideBottom;
            let yBok = hBox - sideTop;

            svg += `<rect x="${sXBok}" y="${yBok}" width="${dBox}" height="${hBok}" fill="#f9fbfd" stroke="#333" stroke-width="${lineW}"/>`;
            svg += `<text x="${sXBok - 20}" y="${hBox/2}" font-size="${fontM}" font-weight="bold" fill="#888" text-anchor="middle" transform="rotate(-90 ${sXBok - 20} ${hBox/2})">TYŁ BOKU</text>`;
            svg += `<text x="${sXBok + dBox + 20}" y="${hBox/2}" font-size="${fontM}" font-weight="bold" fill="#888" text-anchor="middle" transform="rotate(90 ${sXBok + dBox + 20} ${hBox/2})">PRZÓD BOKU</text>`;
            
            let holeFrontX = sXBok + dBox - 37;
            let holeBackX = sXBok + 37;
            let laneHingeHoles = sXBok + dBox + 80;
            let laneShelfHoles = sXBok + dBox + 300;
            let laneHingeAxis  = sXBok + dBox + 550;
            let laneDistances  = sXBok + dBox + 850;

            if (sShelfHoles) {
                let topHoleY = yBok - 40;
                svg += `<line x1="${sXBok}" y1="${topHoleY}" x2="${sXBok + 37}" y2="${topHoleY}" stroke="#d32f2f" stroke-width="2" marker-start="url(#arrow-red)" marker-end="url(#arrow-red)"/>`;
                svg += `<text x="${sXBok + 18}" y="${topHoleY - 10}" font-size="${fontS}" font-weight="bold" fill="#d32f2f" text-anchor="middle">37</text>`;
                svg += `<line x1="${holeFrontX}" y1="${topHoleY}" x2="${sXBok + dBox}" y2="${topHoleY}" stroke="#d32f2f" stroke-width="2" marker-start="url(#arrow-red)" marker-end="url(#arrow-red)"/>`;
                svg += `<text x="${sXBok + dBox - 18}" y="${topHoleY - 10}" font-size="${fontS}" font-weight="bold" fill="#d32f2f" text-anchor="middle">37</text>`;
            }

            svg += `<line x1="${sXCab - 50}" y1="${hBox - sideBottom}" x2="${sXBok + dBox + 150}" y2="${hBox - sideBottom}" stroke="#333" stroke-width="3" stroke-dasharray="8,8" opacity="0.6"/>`;
            svg += `<text x="${sXBok + dBox + 160}" y="${hBox - sideBottom + 8}" font-size="${fontL}" font-weight="bold" fill="#333" text-anchor="start">0 mm (Baza formatki boku)</text>`;

            if(kTyp === 'wpuszczane') {
                svg += `<rect x="${sXBok}" y="0" width="${dBox}" height="${tBoard}" fill="#e8f0fe" stroke="#1F4E79" opacity="0.6" stroke-width="${lineW}"/>`;
                svg += `<rect x="${sXBok}" y="${hBox - tBoard - cokol}" width="${dBox}" height="${tBoard}" fill="#e8f0fe" stroke="#1F4E79" opacity="0.6" stroke-width="${lineW}"/>`;

                if (cokol > 0) {
                    svg += `<line x1="${sXBok - 30}" y1="${hBox}" x2="${sXBok - 30}" y2="${hBox - cokol}" stroke="#1F4E79" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>`;
                    svg += `<text x="${sXBok - 40}" y="${hBox - cokol/2 + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Cokół: ${cokol}</text>`;
                }

                let osWd = cokol + tBoard / 2; 
                let svgOsWd = hBox - osWd;
                let dimWdFromBottom = Math.round(osWd - sideBottom);
                svg += `<line x1="${sXBok - 130}" y1="${svgOsWd}" x2="${sXBok}" y2="${svgOsWd}" stroke="#1F4E79" stroke-dasharray="6,6" stroke-width="2"/>`;
                svg += `<text x="${sXBok - 140}" y="${svgOsWd + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Oś wieńca: ${dimWdFromBottom}</text>`;
                
                let osWg = hBox - tBoard / 2;
                let svgOsWg = hBox - osWg;
                let dimWgFromBottom = Math.round(osWg - sideBottom);
                svg += `<line x1="${sXBok - 130}" y1="${svgOsWg}" x2="${sXBok}" y2="${svgOsWg}" stroke="#1F4E79" stroke-dasharray="6,6" stroke-width="2"/>`;
                svg += `<text x="${sXBok - 140}" y="${svgOsWg + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Oś wieńca: ${dimWgFromBottom}</text>`;

                if (sShelfHoles) {
                    [37, dBox - 37].forEach(x => {
                        svg += `<circle cx="${sXBok + x}" cy="${svgOsWd}" r="5" fill="#1F4E79"/>`;
                        svg += `<circle cx="${sXBok + x}" cy="${svgOsWg}" r="5" fill="#1F4E79"/>`;
                    });
                }
            }

            osie.forEach((data, i) => {
                let ySpodSVG = hBox - data.spod; 
                svg += `<rect x="${sXBok}" y="${ySpodSVG - tBoard}" width="${dBox}" height="${tBoard}" fill="#2F5597" opacity="0.15"/>`;
                
                let osPolki = data.spod + (tBoard / 2); 
                let yOsPolkiSVG = hBox - osPolki;
                let dimPolkaFromBottom = Math.round(osPolki - sideBottom);
                
                if (sShelfAxis) {
                    svg += `<line x1="${sXBok - 130}" y1="${yOsPolkiSVG}" x2="${sXBok}" y2="${yOsPolkiSVG}" stroke="#1F4E79" stroke-dasharray="6,6" stroke-width="2"/>`;
                    svg += `<text x="${sXBok - 140}" y="${yOsPolkiSVG + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Oś: ${dimPolkaFromBottom}</text>`;
                }
                
                if (sShelfHoles) {
                    [-32, 0, 32].forEach(offset => {
                        let drillOs = data.os + offset;
                        let drillY = hBox - drillOs; 
                        let dimFromBottom = Math.round(drillOs - sideBottom);
                        let dimFromTop = Math.round(sideTop - drillOs);
                        
                        let isCenter = offset === 0;
                        let color = isCenter ? "#d32f2f" : "#f57c00";
                        let radius = isCenter ? 5 : 4; 
                        let weight = isCenter ? "bold" : "normal";
                        let fSize = isCenter ? fontL : fontM;

                        svg += `<circle cx="${holeFrontX}" cy="${drillY}" r="${radius}" fill="${color}"/>`;
                        svg += `<circle cx="${holeBackX}" cy="${drillY}" r="${radius}" fill="${color}"/>`;
                        
                        svg += `<line x1="${holeFrontX}" y1="${drillY}" x2="${laneShelfHoles - 10}" y2="${drillY}" stroke="${color}" stroke-dasharray="4,4" stroke-width="2"/>`;
                        svg += `<text x="${laneShelfHoles}" y="${drillY + 8}" font-size="${fSize}" font-weight="${weight}" fill="${color}" text-anchor="start">${dimFromBottom} (${dimFromTop})</text>`;
                    });
                }
                
                if (sDistances && i > 0) {
                    let prevData = osie[i-1];
                    let yPrevHoleSVG = hBox - prevData.os;
                    let yCurrHoleSVG = hBox - data.os;
                    let midDimY = (yPrevHoleSVG + yCurrHoleSVG) / 2;
                    let distHoles = data.os - prevData.os;
                    
                    svg += `<line x1="${laneDistances}" y1="${yPrevHoleSVG}" x2="${laneDistances}" y2="${yCurrHoleSVG}" stroke="#2e7d32" stroke-width="3" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)"/>`;
                    svg += `<rect x="${laneDistances - 35}" y="${midDimY - 20}" width="70" height="40" fill="#fafafa"/>`;
                    svg += `<text x="${laneDistances}" y="${midDimY + 10}" font-size="${fontL}" font-weight="bold" fill="#2e7d32" text-anchor="middle">${distHoles}</text>`;
                }
            });

            // --- NAWIERTY PROWADNIC SZUFLAD NA BOKU ---
            drawerGuides.forEach((dg) => {
                let dimTopFromBottom = Math.round(dg.axisYTop - sideBottom);
                let dimBottomFromBottom = Math.round(dg.axisYBottom - sideBottom);
                
                if (sDrawerTopHoles) {
                    let guideSvgYTop = hBox - dg.axisYTop;
                    svg += `<line x1="${holeFrontX}" y1="${guideSvgYTop}" x2="${laneHingeAxis - 10}" y2="${guideSvgYTop}" stroke="#1F4E79" stroke-dasharray="2,2" stroke-width="3"/>`;
                    svg += `<circle cx="${holeFrontX}" cy="${guideSvgYTop}" r="5" fill="#1F4E79"/>`;
                    svg += `<circle cx="${holeBackX}" cy="${guideSvgYTop}" r="5" fill="#1F4E79"/>`; 
                    svg += `<text x="${laneHingeAxis}" y="${guideSvgYTop + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="start">Otwór górny: ${dimTopFromBottom}</text>`;
                }
                
                if (sDrawerBottomHoles) {
                    let guideSvgYBottom = hBox - dg.axisYBottom;
                    svg += `<line x1="${holeFrontX}" y1="${guideSvgYBottom}" x2="${laneHingeAxis - 10}" y2="${guideSvgYBottom}" stroke="#e65100" stroke-dasharray="2,2" stroke-width="3"/>`;
                    svg += `<circle cx="${holeFrontX}" cy="${guideSvgYBottom}" r="5" fill="#e65100"/>`;
                    svg += `<circle cx="${holeBackX}" cy="${guideSvgYBottom}" r="5" fill="#e65100"/>`; 
                    svg += `<text x="${laneHingeAxis + 320}" y="${guideSvgYBottom + 8}" font-size="${fontL}" font-weight="bold" fill="#e65100" text-anchor="start">Dolny (32): ${dimBottomFromBottom}</text>`;
                }
            });

            // --- ZAWIASY NA BOKU ---
            if ((sHingeAxis || sHingeHoles) && qZaw > 0) {
                doorZawiasy.forEach(zaw => {
                    let drillY = hBox - zaw.bodyY; 
                    let color = zaw.shifted ? "#9c27b0" : "#0288d1"; 
                    
                    if (sHingeAxis) {
                        svg += `<line x1="${holeFrontX - 20}" y1="${drillY}" x2="${laneHingeAxis - 10}" y2="${drillY}" stroke="${color}" stroke-dasharray="2,2" stroke-width="3"/>`;
                        let dimFromBottom = Math.round(zaw.bodyY - sideBottom);
                        let dimFromTop = Math.round(sideTop - zaw.bodyY);
                        let dimText = `${dimFromBottom} (${dimFromTop})`;
                        if (zaw.shifted) dimText += " [KOREKTA]";
                        
                        svg += `<text x="${laneHingeAxis}" y="${drillY + 8}" font-size="${fontL}" font-weight="bold" fill="${color}" text-anchor="start">Prowadnik: ${dimText}</text>`;
                    }
                    
                    if (sHingeHoles) {
                        [-16, 16].forEach(off => {
                            let valY = zaw.bodyY + off; 
                            let hy = hBox - valY; 
                            let dimFromBottom = Math.round(valY - sideBottom);
                            let dimText = `${dimFromBottom}`;
                            
                            svg += `<circle cx="${holeFrontX}" cy="${hy}" r="4" fill="${color}"/>`;
                            svg += `<line x1="${holeFrontX}" y1="${hy}" x2="${laneHingeHoles - 10}" y2="${hy}" stroke="${color}" stroke-dasharray="1,2" stroke-width="1.5"/>`;
                            svg += `<text x="${laneHingeHoles}" y="${hy + 8}" font-size="${fontM}" fill="${color}" text-anchor="start">${dimText}</text>`;
                        });
                    }
                });
            }

            // --- 3. RZUT FRONTU ---
            if (sFront) {
                svg += `<text x="${sXFront + wBox/2}" y="-80" font-size="36" font-weight="bold" fill="#2e7d32" text-anchor="middle">FRONT (Podział zewnętrzny)</text>`;
                
                let baseF = hBox - cokol - fLuzD; 
                svg += `<line x1="${sXFront - 50}" y1="${baseF}" x2="${sXFront + wBox + 150}" y2="${baseF}" stroke="#2e7d32" stroke-width="3" stroke-dasharray="8,8" opacity="0.6"/>`;
                svg += `<text x="${sXFront + wBox + 160}" y="${baseF + 8}" font-size="${fontL}" font-weight="bold" fill="#2e7d32" text-anchor="start">0 mm (DÓŁ FRONTU)</text>`;
                
                frontBlocks.forEach(fb => {
                    let rectTopY = hBox - fb.yEnd; 
                    let rectH = fb.yEnd - fb.yStart;
                    
                    if(fb.type === 'door') {
                        svg += `<rect x="${sXFront}" y="${rectTopY}" width="${wBox}" height="${rectH}" fill="#e2efda" stroke="#2e7d32" stroke-width="${lineW}"/>`;
                        
                        fb.hinges.forEach(zaw => {
                            let cy = hBox - zaw.bodyY; 
                            let color = zaw.shifted ? "#9c27b0" : "#2e7d32";
                            let puszkaX = sXFront + 22; 
                            
                            svg += `<circle cx="${puszkaX}" cy="${cy}" r="17.5" fill="none" stroke="${color}" stroke-width="3"/>`;
                            svg += `<circle cx="${puszkaX}" cy="${cy}" r="3" fill="${color}"/>`;
                            svg += `<line x1="${puszkaX}" y1="${cy}" x2="${sXFront + wBox + 60}" y2="${cy}" stroke="${color}" stroke-dasharray="4,4" stroke-width="2"/>`;
                            
                            let dimFromBottomFront = Math.round(zaw.frontY);
                            let dimFromTopFront = Math.round(rectH - zaw.frontY);
                            let dimText = `${dimFromBottomFront} (${dimFromTopFront})`;
                            if(zaw.shifted) dimText += " [KOREKTA]";
                            svg += `<text x="${sXFront + wBox + 70}" y="${cy + 8}" font-size="${fontL}" font-weight="bold" fill="${color}" text-anchor="start">${dimText}</text>`;
                        });
                    } else if(fb.type === 'drawers') {
                        fb.drawers.forEach((dr, idx) => {
                            let drTopY = hBox - dr.yEnd;
                            let drH = dr.yEnd - dr.yStart;
                            svg += `<rect x="${sXFront}" y="${drTopY}" width="${wBox}" height="${drH}" fill="#e8f0fe" stroke="#1F4E79" stroke-width="${lineW}"/>`;
                            
                            let fSizeLabel = Math.round(drH);
                            svg += `<text x="${sXFront + wBox/2}" y="${drTopY + drH/2 + 8}" font-size="${fontM}" font-weight="bold" fill="#1F4E79" text-anchor="middle">Szuflada ${idx+1} (F: ${fSizeLabel}mm)</text>`;
                        });
                    }
                });
            }

            svg += `</svg>`;
            document.getElementById('svgWrapper').innerHTML = svg;
        }

        window.onload = () => { 
            initZoomPan(); 
            resetLocksAndRun(); 
            renderSavedCabinets(); 
        };
    </script>
</body>
</html>
